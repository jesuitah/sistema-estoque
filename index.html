      function carregarEstoque() {
        var batchSize = 1000;
        var allData = [];

        function fetchBatch(from) {
          return supabase.from('estoque').select('*')
            .order('marca', {ascending: true})
            .order('sku', {ascending: true})
            .range(from, from + batchSize - 1)
            .then(function(result) {
              if (result.error) throw result.error;
              var data = result.data || [];
              allData = allData.concat(data);
              if (data.length === batchSize) return fetchBatch(from + batchSize);
              return allData;
            });
        }

        fetchBatch(0).then(function(data) {
          setEstoque(data);
          var total = data.length;
          var totalUnidades = data.reduce(function(sum, item) { return sum + (item.unidades || 0); }, 0);
          var zerados = data.filter(function(item) { return item.unidades === 0; }).length;
          setStats({total: total, unidades: totalUnidades, zerados: zerados});
          setLoading(false);
        }).catch(function(err) {
          console.error('Erro de conexão:', err);
          setLoading(false);
        });
      }

        // Verifica se já existe em estoque e precos antes de inserir
        Promise.all([
          supabase.from('estoque').select('id').eq('sku', sku).maybeSingle(),
          supabase.from('precos').select('id').eq('marca', marca).eq('sku', sku).maybeSingle()
        ]).then(function(results) {
          var estoqueExiste = results[0].data;
          var precosExiste = results[1].data;
          var ops = [];

          if (!estoqueExiste) {
            ops.push(supabase.from('estoque').insert([{ marca: marca, sku: sku, unidades: novasUnidades }]));
          }
          if (!precosExiste) {
            ops.push(supabase.from('precos').insert([{ marca: marca, sku: sku, custo: custo }]));

          if (ops.length === 0) {
            alert('SKU "' + sku + '" já existe tanto no estoque quanto nos preços.');
            return;

          Promise.all(ops).then(function(res) {
            var err = res.find(function(r) { return r.error; });

            var msgs = [];

            carregarEstoque();
            carregarPrecos();

      function importarSKUsExcel(file) {
        setImporting(true);
        var reader = new FileReader();
        reader.onload = function(e) {
          try {
            var data = new Uint8Array(e.target.result);
            var workbook = XLSX.read(data, {type: 'array'});
            var skusDaPlanilha = [];

            workbook.SheetNames.forEach(function(sheetName) {
              var sheet = workbook.Sheets[sheetName];
              var rows = XLSX.utils.sheet_to_json(sheet, {header: 1});

              rows.forEach(function(row, idx) {
                if (idx < 1) return;
                if (row[0] === null || row[0] === undefined || row[1] === null || row[1] === undefined) return;

                var sku = String(row[0]).trim().toUpperCase();
                var unidades = parseInt(row[1]) || 0;

                if (sku && sku !== 'SKU') {
                  skusDaPlanilha.push({
                    marca: sheetName.trim().toUpperCase(),
                    sku: sku,
                    unidades: unidades
                  });
                }
              });
            });

            if (skusDaPlanilha.length === 0) {
              alert('Nenhum SKU encontrado no arquivo');
              setImporting(false);
              return;
            }

            // Remove duplicatas da planilha (mantém o último por marca+sku)
            var deduped = {};
            skusDaPlanilha.forEach(function(item) {
              deduped[item.marca + '|' + item.sku] = item;
            });
            var skusUnicos = Object.keys(deduped).map(function(k) { return deduped[k]; });

            // Compara com o banco: INSERT novos, UPDATE existentes
            var existentes = estoque.map(function(x) {
              return { id: x.id, marca: (x.marca||'').toUpperCase(), sku: (x.sku||'').toUpperCase() };
            });

            var paraInserir = [];
            var paraAtualizar = [];
            skusUnicos.forEach(function(item) {
              var found = existentes.find(function(e) {
                return e.marca === item.marca && e.sku === item.sku;
              });
              if (found) {
                paraAtualizar.push({ id: found.id, unidades: item.unidades });
              } else {
                paraInserir.push(item);
              }
            });

            var ops = [];
            // Inserir novos em lotes
            var chunkSize = 500;
            for (var ci = 0; ci < paraInserir.length; ci += chunkSize) {
              ops.push(supabase.from('estoque').insert(paraInserir.slice(ci, ci + chunkSize)));
            }
            // Atualizar existentes um a um (necessário para update com id)
            paraAtualizar.forEach(function(item) {
              ops.push(supabase.from('estoque').update({ unidades: item.unidades }).eq('id', item.id));
            });

            if (ops.length === 0) {
              alert('Nenhuma alteração para aplicar.');
              setImporting(false);
              return;
            }

            Promise.all(ops).then(function(results) {
              var err = results.find(function(r) { return r.error; });
              if (err) {
                alert('Erro na importação: ' + err.error.message);
                setImporting(false);
                return;
              }
              alert('✓ ' + paraInserir.length + ' inseridos e ' + paraAtualizar.length + ' atualizados com sucesso!');
              carregarEstoque();
              setImporting(false);
            });
          } catch (err) {
            alert('Erro ao processar arquivo: ' + err.message);
            setImporting(false);
          }
        };
        reader.readAsArrayBuffer(file);
      }

      function normStr(s) {
        return String(s).toUpperCase().replace(/\s+/g, '').replace(/[^A-Z0-9]/g, '');
      }

      function parseSKUsML(celula) {
        var result = [];
        if (!celula) return result;
        var texto = String(celula).trim().toUpperCase();
        // Remove leading KIT: prefix
        texto = texto.replace(/^KIT:\s*/i, '');
        // Split by + (multiple items in kit)
        var partes = texto.split('+');
        var ultimaMarca = '';
        partes.forEach(function(parte) {
          parte = parte.trim();
          // Remove quantity suffix like "- 2UN", "- 3UN" etc
          parte = parte.replace(/\s*-\s*\d+\s*UN\s*$/i, '').trim();
          if (!parte) return;
          if (parte.indexOf(':') !== -1) {
            var idx = parte.indexOf(':');
            var marcaRaw = parte.substring(0, idx).trim();
            var skuRaw = parte.substring(idx + 1).trim();
            if (marcaRaw && skuRaw) {
              ultimaMarca = marcaRaw;
              result.push({ marca: normStr(marcaRaw), sku: normStr(skuRaw) });
            }
          } else if (parte && ultimaMarca) {
            // No marca prefix — use last seen marca
            result.push({ marca: normStr(ultimaMarca), sku: normStr(parte) });
          }
        });
        return result;
      }

      function lerSKUsDoArquivoML(file, idx) {
        // Nome da loja = nome do arquivo sem extensão (ex: KMP.xlsx → KMP)
        var nomeLoja = file.name.replace(/\.[^.]+$/, '').toUpperCase();
        var reader = new FileReader();
        reader.onload = function(evt) {
          try {
            var wb = XLSX.read(evt.target.result, { type: 'array' });
            var sheetName = wb.SheetNames.find(function(n) {
              return n.toLowerCase().indexOf('an') !== -1;
            }) || wb.SheetNames[0];
            var ws = wb.Sheets[sheetName];
            var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
            var headerRow = rows[0] || [];
            var skuColIdx = -1;
            for (var ci = 0; ci < headerRow.length; ci++) {
              if (String(headerRow[ci]).toUpperCase() === 'SKU') { skuColIdx = ci; break; }
            }
            if (skuColIdx === -1) skuColIdx = 4;
            var skuSet = {};
            for (var ri = 4; ri < rows.length; ri++) {
              var skuCell = rows[ri][skuColIdx];
              if (!skuCell) continue;
              var parsed = parseSKUsML(String(skuCell));
              parsed.forEach(function(p) { skuSet[p.marca + '|' + p.sku] = true; });
            }
            // Calcula nova lista fora do setState
            var novaLista = mlLojas.slice();
            var existe = novaLista.findIndex(function(l) { return l.nome === nomeLoja; });
            var actualIdx = existe !== -1 ? existe : Math.min(idx, novaLista.length);
            if (existe !== -1) {
              novaLista[existe] = { nome: nomeLoja, skuSet: skuSet, idx: actualIdx };
            } else {
              novaLista.push({ nome: nomeLoja, skuSet: skuSet, idx: actualIdx });
              novaLista = novaLista.map(function(l, i) { return { nome: l.nome, skuSet: l.skuSet, idx: i }; });
              actualIdx = novaLista.findIndex(function(l) { return l.nome === nomeLoja; });
            }
            // Salva no Supabase ANTES de atualizar estado
            supabase.from('ml_lojas').upsert(
              { nome: nomeLoja, sku_set: skuSet, idx: actualIdx, updated_at: new Date().toISOString() },
              { onConflict: 'nome' }
            ).then(function(res) {
              if (res.error) {
                alert('Erro ao salvar loja ML no Supabase: ' + res.error.message);
              }
            });
            setMlLojas(novaLista);
          } catch(err) {
            alert('Erro ao ler planilha do ML: ' + err.message);
          }
        };
        reader.readAsArrayBuffer(file);
      }

      function carregarPrecos() {

        var allData = [];
        function fetchBatch(from) {
          supabase.from('precos').select('*').order('marca').order('sku').range(from, from + batchSize - 1).then(function(result) {
            if (result.error || !result.data) return;
            allData = allData.concat(result.data);
            if (result.data.length === batchSize) {
              fetchBatch(from + batchSize);
            } else {
              setPrecos(allData);
            }
          });
        }
        fetchBatch(0);
      }

          setMarkupEdit(function(prev) {
            var n = Object.assign({}, prev);
            result.data.forEach(function(row) { n[row.marca] = String(row.markup); });
            return n;

        });

      function salvarMarkupMarca(marca) {

      function marcaMatch(marcaPrecos, marcaKit) {
        var a = normStr(marcaPrecos);
        var b = normStr(marcaKit);
        return a === b || a.startsWith(b) || b.startsWith(a);
      }

      function parseKitComponentesML(skuString) {
        var result = [];
        var texto = String(skuString).trim().toUpperCase().replace(/^KIT:\s*/i, '');
        var partes = texto.split('+');
        var ultimaMarca = '';
        partes.forEach(function(parte) {
          parte = parte.trim();
          var qtdMatch = parte.match(/\s*-\s*(\d+)\s*UN\s*$/i);
          var quantidade = qtdMatch ? parseInt(qtdMatch[1]) : 1;
          parte = parte.replace(/\s*-\s*\d+\s*UN\s*$/i, '').trim();
          if (!parte) return;
          if (parte.indexOf(':') !== -1) {
            var idx = parte.indexOf(':');
            var marcaRaw = parte.substring(0, idx).trim();
            var skuRaw  = parte.substring(idx + 1).trim();
            var skuN = normStr(skuRaw);
            if (marcaRaw && skuN && skuN.length >= 2 && skuN.length <= 25) {
              ultimaMarca = marcaRaw;
              result.push({ marca: normStr(marcaRaw), sku: skuN, skuOriginal: skuRaw.trim(), quantidade: quantidade });
            }
          } else if (parte && ultimaMarca) {
            var s = normStr(parte);
            if (s && s.length >= 2 && s.length <= 25)
              result.push({ marca: normStr(ultimaMarca), sku: s, skuOriginal: parte.trim(), quantidade: quantidade });
          }
        });
        return result;
      }
      function salvarCustoProduto(p) {

        if (isNaN(novoCusto) || novoCusto <= 0) { alert('Custo inválido.'); return; }
        var usaCustoML = p.custo_ml !== null && p.custo_ml !== undefined && Number(p.custo_ml) > 0;
        var update = usaCustoML ? { custo_ml: novoCusto } : { custo: novoCusto };
        supabase.from('precos').update(update).eq('marca', p.marca).eq('sku', p.sku).then(function(res) {
          if (res.error) { alert('Erro ao salvar: ' + res.error.message); return; }
          setPrecos(function(prev) {
            return prev.map(function(x) {
              if (x.marca === p.marca && x.sku === p.sku) return Object.assign({}, x, update);
              return x;
            });
          });
          setEditandoCustoChave(null);
        });
      }

      function exportarEstoque() {
        if (!estoque || estoque.length === 0) {
          alert('Nenhum dado para exportar.');
          return;
        }
        var dados = [['MARCA', 'SKU', 'UNIDADES']].concat(
          estoque.slice().sort(function(a, b) {
            var ma = (a.marca || '').toUpperCase(), mb = (b.marca || '').toUpperCase();
            if (ma !== mb) return ma < mb ? -1 : 1;
            return (a.sku || '').toUpperCase() < (b.sku || '').toUpperCase() ? -1 : 1;
          }).map(function(item) {
            return [item.marca || '', item.sku || '', item.unidades || 0];
          })
        );
        var ws = XLSX.utils.aoa_to_sheet(dados);
        ws['!cols'] = [{wch: 20}, {wch: 20}, {wch: 12}];
        var wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Estoque');
        XLSX.writeFile(wb, 'estoque_completo.xlsx');

      function processarEnviosFull(file) {
        setImporting(true);
        setPendingChanges(null);

        var reader = new FileReader();
        reader.onload = function(evt) {
          try {
            var wb = XLSX.read(evt.target.result, { type: 'array' });
            var ws = wb.Sheets[wb.SheetNames[0]];
            var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

            // Pula cabeçalho (linha 0) e lê as demais
            var entries = [];
            for (var i = 1; i < rows.length; i++) {
              var row = rows[i];
              var marca = normStr(String(row[0] || ''));
              var sku   = normStr(String(row[1] || ''));
              var qty   = parseInt(row[2]) || 0;
              if (marca && sku && qty > 0) {
                entries.push({ marca: marca, sku: sku, qty: qty });
              }
            }

            if (entries.length === 0) {
              alert('Nenhum item encontrado na planilha.');
              setImporting(false);
              return;
            }

            var dbItems = estoque.map(function(x) {
              return { id: x.id, marca: normStr(x.marca), sku: normStr(x.sku), marcaOrig: x.marca, skuOrig: x.sku, unidades: x.unidades };
            });

            var changeMap = {};
            var naoEncontrados = [];

            entries.forEach(function(entry) {
              var dbItem = dbItems.find(function(d) { return d.marca === entry.marca && d.sku === entry.sku; });
              if (!dbItem) dbItem = dbItems.find(function(d) { return d.sku === entry.sku; });

              if (dbItem) {
                if (changeMap[dbItem.id]) {
                  changeMap[dbItem.id].baixa += entry.qty;
                  changeMap[dbItem.id].novoEstoque = Math.max(0, changeMap[dbItem.id].estoqueAtual - changeMap[dbItem.id].baixa);
                } else {
                  changeMap[dbItem.id] = { id: dbItem.id, marca: dbItem.marcaOrig, sku: dbItem.skuOrig, estoqueAtual: dbItem.unidades, baixa: entry.qty, novoEstoque: Math.max(0, dbItem.unidades - entry.qty) };
                }
              } else {
                naoEncontrados.push(entry.marca + ': ' + entry.sku + ' (qty: ' + entry.qty + ')');
              }
            });

            var changes = Object.keys(changeMap).map(function(k) { return changeMap[k]; });
            setPendingChanges({ changes: changes, naoEncontrados: naoEncontrados });
            setImporting(false);
          } catch(err) {
            alert('Erro ao ler planilha: ' + err.message);
            setImporting(false);
          }
        };
        reader.readAsArrayBuffer(file);
      }

            e('div', {className: 'bg-slate-800 border border-slate-700 p-5 rounded-lg'},
              e('h2', {className: 'text-lg font-bold mb-1'}, '🏪 Lojas Mercado Livre'),
              e('p', {className: 'text-slate-400 text-sm mb-1'},
                'Renomeie os arquivos com o nome da loja (ex: ', e('code', {className: 'bg-slate-700 px-1 rounded'}, 'KMP.xlsx'), ', ',
                e('code', {className: 'bg-slate-700 px-1 rounded'}, 'ERP.xlsx'), ', ',
                e('code', {className: 'bg-slate-700 px-1 rounded'}, 'LOTTUS.xlsx'), ') e selecione todos de uma vez.'
              ),
              e('p', {className: 'text-slate-500 text-xs mb-4'}, 'Os badges coloridos aparecerão automaticamente nos cards da aba Busca.'),
              e('label', {className: 'flex items-center justify-center gap-2 w-full bg-blue-600 hover:bg-blue-500 text-white px-4 py-3 rounded-lg font-bold text-sm cursor-pointer transition-colors'},
                '📂 Selecionar planilhas das lojas',
                e('input', {

                  style: {display: 'none'},
                  onChange: function(ev) {
                    var files = ev.target.files;
                    if (!files || !files.length) return;
                    for (var fi = 0; fi < files.length; fi++) {
                      lerSKUsDoArquivoML(files[fi], fi);
                    }
                    ev.target.value = '';
                  }
                })

              mlLojas.length > 0 && e('div', {className: 'mt-4 space-y-2'},
                e('div', {className: 'text-xs font-bold text-slate-400 uppercase mb-2'}, 'Lojas carregadas:'),

                      e('span', {className: cor.bg + ' ' + cor.text + ' px-2 py-0.5 rounded text-xs font-bold'}, loja.nome),
                      e('span', {className: 'text-green-400 text-xs'}, '✓ carregada'),
                      e('button', {
                        onClick: function() { removerLojaML(loja.nome); },

                      }, '×')

                  })

          activeTab === 'precos' && e('div', {className: 'space-y-4'},

            // Busca + Configurações
            e('div', {className: 'flex gap-3'},
              e('input', {
                type: 'text', placeholder: 'Digite o SKU ou marca...',
                value: precosSearch,
                onChange: function(ev) { setPrecosSearch(ev.target.value); setModoSelecao(false); setSkusSelecionados([]); setPaginaPrecos(1); },
                className: 'flex-1 bg-slate-800 text-white px-4 py-3 rounded-lg border border-slate-600 focus:border-blue-400 focus:outline-none text-sm'
              }),
              modoSelecao && skusSelecionados.length > 0 && e('button', {
                onClick: excluirSelecionados,

              }, '🗑 Excluir ' + skusSelecionados.length),
              precosSearch.trim().length > 0 && e('button', {
                onClick: function() { setModoSelecao(function(v){return !v;}); setSkusSelecionados([]); },
                className: 'flex items-center gap-2 ' + (modoSelecao ? 'bg-blue-600 border-blue-500' : 'bg-slate-800 border-slate-600 hover:border-slate-500') + ' border text-slate-200 px-4 py-3 rounded-lg font-bold text-sm transition-colors whitespace-nowrap'
              }, modoSelecao ? '✓ Selecionando' : '☑ Selecionar'),
              e('button', {
                onClick: function() { setShowConfigPrecos(function(v){return !v;}); },

            ),

            // ── Painel de configurações (importações, markup e kits) ──
            showConfigPrecos && e('div', {className: 'space-y-4'},
              // Ações
              e('div', {className: 'flex items-center gap-3 flex-wrap'},
                precos.length > 0 && e('span', {className: 'text-slate-400 text-sm'}, precos.length + ' produtos cadastrados'),
                precos.length > 0 && e('button', {
                  onClick: limparTodosPrecos,

              // Configuração ML por Marca
              e('div', {className: 'bg-slate-800 border border-slate-700 rounded-lg overflow-hidden'},
                e('button', {
                  onClick: function() { setShowMarkupEditorML(function(v){return !v;}); },
                  className: 'w-full flex items-center justify-between px-5 py-3 hover:bg-slate-700 transition-colors'
                },
                  e('span', {className: 'font-bold text-sm text-slate-200'}, '⚙️ Configuração ML por Marca'),
                  e('span', {className: 'text-slate-400 text-sm'}, showMarkupEditorML ? '▲ Fechar' : '▼ Editar')
                ),
                showMarkupEditorML && e('div', {className: 'px-5 pb-5'},
                  e('p', {className: 'text-slate-400 text-xs mb-3'}, 'Markup padrão: 60% · Taxa padrão: 23% · Frete: deixe em branco para automático (custo ≤ R$32,64 → R$12 / custo ≥ R$32,65 → R$30), ou coloque um valor fixo para a marca inteira.'),
                  precos.length === 0
                    ? e('p', {className: 'text-slate-500 text-sm'}, 'Importe a planilha de custos primeiro.')
                    : e('div', {className: 'space-y-2'},
                        (function() {
                          var marcas = [];
                          precos.forEach(function(p) { if (marcas.indexOf(p.marca) === -1) marcas.push(p.marca); });
                          marcas.sort();
                          return marcas.map(function(marca) {
                            var cfg = markupEditML[marca] || {};
                            var vMarkup = cfg.markup !== undefined ? cfg.markup : String((markupsML[marca]||{}).markup||60);
                            var freteAtual = (markupsML[marca]||{}).frete;
                            var vFrete = cfg.frete !== undefined ? cfg.frete : (freteAtual !== null && freteAtual !== undefined ? String(freteAtual) : '');
                            var vTaxa   = cfg.taxa   !== undefined ? cfg.taxa   : String((markupsML[marca]||{}).taxa||23);
                            var inp = function(lbl, val, key, ph) {
                              return e('div', {className: 'flex flex-col items-center'},
                                e('span', {className: 'text-xs text-slate-400 mb-1'}, lbl),
                                e('input', {
                                  type: 'text', inputMode: 'numeric', value: val, placeholder: ph || '',
                                  onChange: function(ev) {
                                    var v = ev.target.value;
                                    setMarkupEditML(function(prev) {
                                      var n = Object.assign({}, prev);
                                      n[marca] = Object.assign({}, n[marca]||{});
                                      n[marca][key] = v;
                                      return n;
                                    });
                                  },
                                  onKeyDown: function(ev) { if(ev.key==='Enter') salvarMarkupMarcaML(marca); },
                                  className: 'w-16 bg-slate-600 border border-slate-500 text-white text-sm px-2 py-1 rounded outline-none text-center'
                                })
                              );
                            };
                            return e('div', {key: marca, className: 'bg-slate-700 rounded-lg px-4 py-3 flex items-center gap-4'},
                              e('span', {className: 'text-xs font-bold text-slate-300 w-28 flex-shrink-0'}, marca),
                              inp('Markup%', vMarkup, 'markup'),
                              inp('Frete R$', vFrete, 'frete', 'Auto'),
                              inp('Taxa%', vTaxa, 'taxa'),
                              e('button', {
                                onMouseDown: function(ev) { ev.preventDefault(); salvarMarkupMarcaML(marca); },
                                className: 'ml-2 bg-yellow-400 hover:bg-yellow-300 text-slate-900 text-xs px-3 py-1.5 rounded font-bold transition-colors'
                              }, '✓')
                            );
                          });
                        })()
                      )
                )
              ),

              // Markup por Marca (Mecânico)
              e('div', {className: 'bg-slate-800 border border-slate-700 rounded-lg overflow-hidden'},
                e('button', {
                  onClick: function() { setShowMarkupEditor(function(v) { return !v; }); },
                  className: 'w-full flex items-center justify-between px-5 py-3 hover:bg-slate-700 transition-colors'
                },
                  e('span', {className: 'font-bold text-sm text-slate-200'}, '⚙️ Markup por Marca (Mecânico)'),
                  e('span', {className: 'text-slate-400 text-sm'}, showMarkupEditor ? '▲ Fechar' : '▼ Editar')
                ),
                showMarkupEditor && e('div', {className: 'px-5 pb-5'},
                  e('p', {className: 'text-slate-400 text-xs mb-3'}, 'Marcas sem configuração usam 60% como padrão. Clique em ✓ para salvar cada uma.'),
                  precos.length === 0
                    ? e('p', {className: 'text-slate-500 text-sm'}, 'Importe a planilha de custos primeiro para ver as marcas.')
                    : e('div', {className: 'grid grid-cols-2 gap-2 sm:grid-cols-3 md:grid-cols-4'},
                        (function() {
                          var marcas = [];
                          precos.forEach(function(p) { if (marcas.indexOf(p.marca) === -1) marcas.push(p.marca); });
                          marcas.sort();
                          return marcas.map(function(marca) {
                            var val = markupEdit[marca] !== undefined ? markupEdit[marca] : (markups[marca] || 60);
                            return e('div', {key: marca, className: 'bg-slate-700 rounded-lg p-3'},
                              e('div', {className: 'text-xs font-bold text-slate-300 mb-2 truncate'}, marca),
                              e('div', {className: 'flex items-center gap-1'},
                                e('input', {
                                  type: 'text', inputMode: 'numeric',
                                  value: val,
                                  onChange: function(ev) {
                                    var v = ev.target.value;
                                    setMarkupEdit(function(prev) { var n = Object.assign({}, prev); n[marca] = v; return n; });
                                  },
                                  onKeyDown: function(ev) {
                                    if (ev.key === 'Enter') salvarMarkupMarca(marca);
                                  },
                                  className: 'w-14 bg-slate-600 border border-slate-500 text-white text-sm px-2 py-1 rounded outline-none text-center'
                                }),
                                e('span', {className: 'text-slate-400 text-sm'}, '%'),
                                e('button', {
                                  onMouseDown: function(ev) { ev.preventDefault(); salvarMarkupMarca(marca); },
                                  className: 'ml-1 bg-blue-600 hover:bg-blue-500 text-white text-xs px-2 py-1 rounded font-bold transition-colors'
                                }, '✓'),
                                e('button', {
                                  onMouseDown: function(ev) { ev.preventDefault(); excluirMarca(marca); },
                                  className: 'ml-1 bg-red-700 hover:bg-red-600 text-white text-xs px-2 py-1 rounded font-bold transition-colors',
                                  title: 'Excluir marca'
                                }, '🗑')
                              )
                            );
                          });
                        })()
                      )
                )
              ),
            ),

            // ── Grid de produtos (custo + preço ML + preço mecânico) ──
            (function() {
              var term = precosSearch.trim().toUpperCase();
              if (precos.length === 0) return e('p', {className: 'text-slate-500 text-sm text-center py-10'}, 'Nenhum custo cadastrado.');
              var filtrados = term
                ? precos.filter(function(p) {
                    return p.marca.toUpperCase().indexOf(term) !== -1 || p.sku.toUpperCase().indexOf(term) !== -1;
                  })
                : precos;
              var POR_PAGINA = 100;
              var exibidos = filtrados.slice(0, paginaPrecos * POR_PAGINA);
              var fmt = function(n) { return 'R$ ' + Number(n).toFixed(2).replace('.', ','); };
              return e('div', null,
                e('div', {className: 'flex items-center justify-between mb-4'},
                  e('p', {className: 'text-slate-500 text-xs'}, 'Exibindo ' + exibidos.length + ' de ' + filtrados.length + ' produtos'),
                  modoSelecao && filtrados.length > 0 && e('button', {
                    onClick: function() {
                      var todasChaves = filtrados.map(function(p) { return p.marca+'|'+p.sku; });
                      setSkusSelecionados(function(sel) {
                        return sel.length === todasChaves.length ? [] : todasChaves;
                      });
                    },
                    className: 'text-xs text-blue-400 hover:text-blue-300 underline'
                  }, skusSelecionados.length === filtrados.length ? 'Desmarcar todos' : 'Selecionar todos')
                ),
                e('div', {className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4'},
                  exibidos.map(function(p) {
                    var custoML = p.custo_ml ? Number(p.custo_ml) : Number(p.custo);
                    var cfg = markupsML[p.marca] || {};
                    var markupML = cfg.markup !== undefined ? cfg.markup : 60;
                    var taxa = cfg.taxa !== undefined ? cfg.taxa : 23;
                    var freteAuto = custoML <= 32.64 ? 12 : 30;
                    var freteMarca = (cfg.frete !== null && cfg.frete !== undefined) ? cfg.frete : freteAuto;
                    var freteProduto = (p.frete_ml_override !== null && p.frete_ml_override !== undefined) ? Number(p.frete_ml_override) : null;
                    var frete = freteProduto !== null ? freteProduto : freteMarca;
                    var freteLabel = freteProduto !== null ? fmt(freteProduto) : 'Auto';
                    var precoCalcML = (custoML * (1 + markupML/100) + frete) * (1 + taxa/100);
                    var precoML = p.preco_ml ? Number(p.preco_ml) : precoCalcML;

                    var markupMec = markups[p.marca] !== undefined ? markups[p.marca] : 60;
                    var precoMec = p.preco_mecanico ? Number(p.preco_mecanico) : custoML * (1 + markupMec/100);

                    var chave = p.marca + '|' + p.sku;
                    var editandoCusto = editandoCustoChave === chave;
                    var editandoSku = editandoSkuChave === chave;
                    var editandoFrete = editandoFreteChave === chave;
                    var selecionado = skusSelecionados.indexOf(chave) !== -1;

                    return e('div', {
                      key: chave,
                      className: 'group bg-slate-800 border rounded-lg p-4 transition-colors cursor-default ' + (selecionado ? 'border-blue-500 bg-slate-700' : 'border-slate-700 hover:border-slate-500'),
                      onClick: modoSelecao ? function() {
                        setSkusSelecionados(function(sel) {
                          return sel.indexOf(chave) !== -1 ? sel.filter(function(c){return c!==chave;}) : sel.concat([chave]);
                        });
                      } : undefined
                    },
                      e('div', {className: 'flex items-center justify-between mb-1'},
                        e('div', {className: 'text-xs text-slate-500 font-bold uppercase tracking-wider'}, p.marca),
                        modoSelecao && e('input', {
                          type: 'checkbox', readOnly: true, checked: selecionado,
                          className: 'w-4 h-4 accent-blue-500 cursor-pointer'
                        })
                      ),
                      editandoSku
                        ? e('div', {className: 'flex items-center gap-2 mb-3'},
                            e('input', {
                              type: 'text', autoFocus: true,
                              value: skuEditValue,
                              onChange: function(ev) { setSkuEditValue(ev.target.value.toUpperCase()); },
                              onKeyDown: function(ev) {
                                if (ev.key === 'Enter') salvarSkuProduto(p);
                                if (ev.key === 'Escape') setEditandoSkuChave(null);
                              },
                              className: 'flex-1 bg-slate-700 border border-blue-400 text-white text-base font-bold px-2 py-1 rounded outline-none'
                            }),
                            e('button', {onClick: function() { salvarSkuProduto(p); }, className: 'bg-green-600 hover:bg-green-500 text-white text-sm font-bold px-3 py-1.5 rounded'}, '✓'),
                            e('button', {onClick: function() { setEditandoSkuChave(null); }, className: 'bg-slate-600 hover:bg-red-700 text-white text-sm font-bold px-3 py-1.5 rounded'}, '✗')
                          )
                        : e('div', {className: 'flex items-center gap-2 mb-3'},
                            e('span', {className: 'text-base font-bold text-white'}, p.sku),
                            e('button', {
                              onClick: function() { setEditandoSkuChave(chave); setSkuEditValue(p.sku); },
                              className: 'opacity-0 group-hover:opacity-100 transition-opacity text-slate-400 hover:text-blue-400 text-xs',
                              title: 'Editar SKU'
                            }, '✏️')
                          ),
                      e('div', {className: 'flex items-center justify-between mb-3'},
                        e('span', {className: 'text-xs text-slate-400'}, 'Custo'),
                        editandoCusto
                          ? e('div', {className: 'flex items-center gap-2'},
                              e('input', {
                                type: 'text', inputMode: 'numeric', autoFocus: true,
                                value: custoEditValue,
                                onChange: function(ev) { setCustoEditValue(ev.target.value); },
                                onKeyDown: function(ev) {
                                  if (ev.key === 'Enter') salvarCustoProduto(p);
                                  if (ev.key === 'Escape') setEditandoCustoChave(null);
                                },
                                className: 'w-24 bg-slate-700 border border-blue-400 text-white text-sm px-2 py-1 rounded outline-none text-right'
                              }),
                              e('button', {onClick: function() { salvarCustoProduto(p); }, className: 'bg-green-600 hover:bg-green-500 text-white text-sm font-bold px-3 py-1.5 rounded'}, '✓'),
                              e('button', {onClick: function() { setEditandoCustoChave(null); }, className: 'bg-slate-600 hover:bg-red-700 text-white text-sm font-bold px-3 py-1.5 rounded'}, '✗')
                            )
                          : e('div', {className: 'flex items-center gap-2'},
                              e('span', {className: 'text-sm text-slate-300'}, fmt(custoML)),
                              e('button', {
                                onClick: function() {
                                  setEditandoCustoChave(chave);
                                  setCustoEditValue(String(custoML.toFixed(2)).replace('.', ','));
                                },
                                className: 'opacity-0 group-hover:opacity-100 transition-opacity text-slate-400 hover:text-blue-400 text-xs',
                                title: 'Editar custo'
                              }, '✏️')
                            )
                      ),
                      e('div', {className: 'flex items-center justify-between mb-3'},
                        e('span', {className: 'text-xs text-slate-400'}, 'Frete ML'),
                        editandoFrete
                          ? e('div', {className: 'flex items-center gap-2'},
                              e('input', {
                                type: 'text', inputMode: 'numeric', autoFocus: true,
                                placeholder: 'Ex: 30,00 (vazio = Auto)',
                                value: freteEditValue,
                                onChange: function(ev) { setFreteEditValue(ev.target.value); },
                                onKeyDown: function(ev) {
                                  if (ev.key === 'Enter') salvarFreteProduto(p);
                                  if (ev.key === 'Escape') setEditandoFreteChave(null);
                                },
                                className: 'w-28 bg-slate-700 border border-blue-400 text-white text-sm px-2 py-1 rounded outline-none text-right'
                              }),
                              e('button', {onClick: function() { salvarFreteProduto(p); }, className: 'bg-green-600 hover:bg-green-500 text-white text-sm font-bold px-3 py-1.5 rounded'}, '✓'),
                              e('button', {onClick: function() { setEditandoFreteChave(null); }, className: 'bg-slate-600 hover:bg-red-700 text-white text-sm font-bold px-3 py-1.5 rounded'}, '✗')
                            )
                          : e('div', {className: 'flex items-center gap-2'},
                              e('span', {className: 'text-sm ' + (freteProduto !== null ? 'text-blue-300 font-semibold' : 'text-slate-500')}, freteLabel),
                              e('button', {
                                onClick: function() {
                                  setEditandoFreteChave(chave);
                                  setFreteEditValue(freteProduto !== null ? String(freteProduto.toFixed(2)).replace('.', ',') : '');
                                },
                                className: 'opacity-0 group-hover:opacity-100 transition-opacity text-slate-400 hover:text-blue-400 text-xs',
                                title: 'Editar frete ML'
                              }, '✏️')
                            )
                      ),
                      e('div', {className: 'flex items-center gap-2'},
                        p.kit_apenas
                          ? e('div', {className: 'flex items-center gap-2 flex-1'},
                              e('span', {className: 'text-xs text-purple-400 font-bold bg-purple-900 bg-opacity-40 px-2 py-1 rounded flex-1 text-center'}, '📦 Apenas em kit'),
                              e('button', {
                                title: 'Desmarcar — mostrar como produto normal',
                                onClick: function() {
                                  supabase.from('precos').update({kit_apenas: false}).eq('marca', p.marca).eq('sku', p.sku).then(function(res) {
                                    if (res.error) { alert('Erro: ' + res.error.message); return; }
                                    setPrecos(function(prev) { return prev.map(function(x) { return (x.marca===p.marca&&x.sku===p.sku) ? Object.assign({},x,{kit_apenas:false}) : x; }); });
                                  });
                                },
                                className: 'text-slate-500 hover:text-purple-300 text-xs opacity-0 group-hover:opacity-100 transition-opacity'
                              }, '🔓')
                            )
                          : custoML > 0
                            ? e('div', {className: 'flex flex-col items-center bg-yellow-400 px-3 py-1.5 rounded-lg flex-1'},
                                e('span', {className: 'text-xs text-slate-900 font-semibold opacity-80'}, 'Preço ML'),
                                e('span', {className: 'text-base font-black text-slate-900'}, fmt(precoML))
                              )
                            : null,
                        precoMec > 0 && e('div', {className: 'flex flex-col items-center bg-green-500 px-3 py-1.5 rounded-lg flex-1'},
                          e('span', {className: 'text-xs text-white font-semibold opacity-90'}, 'Preço Mecânico'),
                          e('span', {className: 'text-base font-black text-white'}, fmt(precoMec))
                        )
                      )
                    );
                  })
                ),
                exibidos.length < filtrados.length && e('div', {className: 'text-center mt-6'},
                  e('button', {
                    onClick: function() { setPaginaPrecos(function(p) { return p + 1; }); },
                    className: 'bg-slate-700 hover:bg-slate-600 text-slate-200 px-6 py-2 rounded-lg text-sm font-bold transition-colors'
                  }, 'Carregar mais (' + (filtrados.length - exibidos.length) + ' restantes)')
                )
              );
            })()
          ),

        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(e(App, null));
  </script>
