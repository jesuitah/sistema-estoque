    var supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB5bGt1Zmh6aW9oeHZ3YmJhdWVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTIyNzMsImV4cCI6MjA5MTE2ODI3M30.S61OxgJa03KmfJZ_MdFL0ZKAzWdsrrYwnmzuqN6L0vQ';

    function StatsCard(props) {
      return e('div', {className: props.cor + ' text-white px-6 py-3 rounded-lg font-bold text-center'},
        e('div', {className: 'text-2xl'}, props.numero),
        e('div', {className: 'text-xs uppercase opacity-90'}, props.label)
      );
    }

    function SKUCard(props) {
      var item = props.item;
      var isZerado = item.unidades === 0;
      var borderColor = isZerado ? 'border-l-4 border-red-400 bg-red-50' : 'border-l-4 border-green-400 bg-green-50';
      var badgeColor = isZerado ? 'bg-red-200 text-red-800' : 'bg-green-200 text-green-800';
      var inputId = 'qty-' + item.id;

      return e('div', {className: borderColor + ' p-4 rounded-lg relative text-gray-800 shadow'},
        e('button', {
          onClick: function() { props.onDelete(item.id); },
          className: 'absolute top-2 right-2 w-7 h-7 flex items-center justify-center hover:bg-red-200 rounded-full text-red-600 font-bold text-sm'
        }, 'x'),
        e('div', {className: 'mb-1'},
          e('div', {className: 'text-xs text-gray-500 font-semibold uppercase'}, item.marca),
          e('div', {className: 'text-lg font-bold text-gray-900'}, item.sku)
        ),
        e('div', {className: 'flex justify-between items-center mb-3'},
          e('span', {className: badgeColor + ' px-3 py-1 rounded-full text-sm font-bold'},
            isZerado ? 'ZERADO' : item.unidades + ' un'
          )
        ),
        e('div', {className: 'flex gap-2'},
          e('input', {
            type: 'number',
            id: inputId,
            placeholder: '0',
            min: '0',
            className: 'w-20 px-2 py-1 border border-gray-300 rounded text-sm text-gray-800 bg-white'
          }),
          e('button', {
            onClick: function() {
              var qty = parseInt(document.getElementById(inputId).value) || 0;
              if (qty > 0) props.onSaida(item, qty);
              document.getElementById(inputId).value = '';
            },
            className: 'flex-1 bg-red-500 hover:bg-red-600 text-white px-2 py-1 rounded font-bold text-sm transition'
          }, 'SAIDA'),
          e('button', {
            onClick: function() {
              var qty = parseInt(document.getElementById(inputId).value) || 0;
              if (qty > 0) props.onEntrada(item, qty);
              document.getElementById(inputId).value = '';
            },
            className: 'flex-1 bg-green-500 hover:bg-green-600 text-white px-2 py-1 rounded font-bold text-sm transition'
          }, 'ENTRADA')
        )
      );
    }

    function App() {
      var activeTabState = useState('sku');
      var activeTab = activeTabState[0];
      var setActiveTab = activeTabState[1];

      var estoqueState = useState([]);
      var estoque = estoqueState[0];
      var setEstoque = estoqueState[1];

      var loadingState = useState(true);
      var loading = loadingState[0];
      var setLoading = loadingState[1];

      var searchState = useState('');
      var searchTerm = searchState[0];
      var setSearchTerm = searchState[1];

      var statsState = useState({total: 0, unidades: 0, zerados: 0});
      var stats = statsState[0];
      var setStats = statsState[1];

      var marcaState = useState('');
      var novaMarca = marcaState[0];
      var setNovaMarca = marcaState[1];

      var skuState = useState('');
      var novoSku = skuState[0];
      var setNovoSku = skuState[1];

      var unidadesState = useState(0);
      var novasUnidades = unidadesState[0];
      var setNovasUnidades = unidadesState[1];

      var importingState = useState(false);
      var importing = importingState[0];
      var setImporting = importingState[1];

      var pendingState = useState(null);
      var pendingChanges = pendingState[0];
      var setPendingChanges = pendingState[1];

      function carregarEstoque() {
        var batchSize = 1000;
        var allData = [];

        function fetchBatch(from) {
          return supabase.from('estoque').select('*')
            .order('marca', {ascending: true})
            .order('sku', {ascending: true})
            .range(from, from + batchSize - 1)
            .then(function(result) {
              if (result.error) throw result.error;
              var data = result.data || [];
              allData = allData.concat(data);
              if (data.length === batchSize) return fetchBatch(from + batchSize);
              return allData;
            });
        }

        fetchBatch(0).then(function(data) {
          setEstoque(data);
          var total = data.length;
          var totalUnidades = data.reduce(function(sum, item) { return sum + (item.unidades || 0); }, 0);
          var zerados = data.filter(function(item) { return item.unidades === 0; }).length;
          setStats({total: total, unidades: totalUnidades, zerados: zerados});
          setLoading(false);
        }).catch(function(err) {
          console.error('Erro de conexão:', err);
          setLoading(false);
        });
      }

      useEffect(function() {
        carregarEstoque();
        var subscription = supabase
          .channel('estoque-realtime')
          .on('postgres_changes', {event: '*', schema: 'public', table: 'estoque'}, function() {
            carregarEstoque();
          })
          .subscribe();
        return function() { subscription.unsubscribe(); };
      }, []);

      function adicionarSKU() {
        if (!novaMarca.trim() || !novoSku.trim()) {
          alert('Preencha a Marca e o SKU!');
          return;
        }
        supabase.from('estoque').insert([{
          marca: novaMarca.trim().toUpperCase(),
          sku: novoSku.trim().toUpperCase(),
          unidades: novasUnidades
        }]).then(function(result) {
          if (result.error) { alert('Erro: ' + result.error.message); return; }
          setNovaMarca('');
          setNovoSku('');
          setNovasUnidades(0);
          carregarEstoque();
        });
      }

      function deletarSKU(id) {
        if (!confirm('Deletar este SKU?')) return;
        supabase.from('estoque').delete().eq('id', id).then(function(result) {
          if (result.error) { alert('Erro: ' + result.error.message); return; }
          carregarEstoque();
        });
      }

      function fazerMovimento(item, quantidade, tipo) {
        var novaQtd = tipo === 'entrada'
          ? item.unidades + quantidade
          : Math.max(0, item.unidades - quantidade);
        supabase.from('estoque').update({unidades: novaQtd}).eq('id', item.id).then(function(result) {
          if (result.error) { alert('Erro: ' + result.error.message); return; }
          carregarEstoque();
        });
      }

      function importarSKUsExcel(file) {
        setImporting(true);
        var reader = new FileReader();
        reader.onload = function(e) {
          try {
            var data = new Uint8Array(e.target.result);
            var workbook = XLSX.read(data, {type: 'array'});
            var skusDaPlanilha = [];

            workbook.SheetNames.forEach(function(sheetName) {
              var sheet = workbook.Sheets[sheetName];
              var rows = XLSX.utils.sheet_to_json(sheet, {header: 1});

              rows.forEach(function(row, idx) {
                if (idx < 1) return;
                if (row[0] === null || row[0] === undefined || row[1] === null || row[1] === undefined) return;

                var sku = String(row[0]).trim().toUpperCase();
                var unidades = parseInt(row[1]) || 0;

                if (sku && sku !== 'SKU') {
                  skusDaPlanilha.push({
                    marca: sheetName.trim().toUpperCase(),
                    sku: sku,
                    unidades: unidades
                  });
                }
              });
            });

            if (skusDaPlanilha.length === 0) {
              alert('Nenhum SKU encontrado no arquivo');
              setImporting(false);
              return;
            }

            var chunkSize = 500;
            var chunks = [];
            for (var ci = 0; ci < skusDaPlanilha.length; ci += chunkSize) {
              chunks.push(skusDaPlanilha.slice(ci, ci + chunkSize));
            }
            Promise.all(chunks.map(function(chunk) {
              return supabase.from('estoque').upsert(chunk, { onConflict: 'sku' });
            })).then(function(results) {
              var err = results.find(function(r) { return r.error; });
              if (err) {
                alert('Erro na importação: ' + err.error.message);
                setImporting(false);
                return;
              }
              alert('✓ ' + skusDaPlanilha.length + ' SKUs importados/atualizados com sucesso!');
              carregarEstoque();
              setImporting(false);
            });
          } catch (err) {
            alert('Erro ao processar arquivo: ' + err.message);
            setImporting(false);
          }
        };
        reader.readAsArrayBuffer(file);
      }

      function processarEnviosFull(file) {
        setImporting(true);

        function normSku(str) {
          return String(str).toUpperCase().replace(/[^A-Z0-9]/g, '');
        }

        function extrairSku(str) {
          var s = str.trim();
          if (s.indexOf(':') !== -1) {
            s = s.substring(s.lastIndexOf(':') + 1).trim();
          }
          var partes = s.split(/\s+/).filter(function(p) { return p.length > 0; });
          for (var i = partes.length - 1; i >= 0; i--) {
            if (/[A-Za-z]/.test(partes[i]) && /[0-9]/.test(partes[i])) {
              return normSku(partes[i]);
            }
          }
          for (var i = partes.length - 1; i >= 0; i--) {
            if (/^\d{5,}$/.test(partes[i])) {
              return normSku(partes[i]);
            }
          }
          for (var i = partes.length - 1; i >= 0; i--) {
            if (!/^\d+$/.test(partes[i])) {
              return normSku(partes[i]);
            }
          }
          return partes.length > 0 ? normSku(partes[partes.length - 1]) : '';
        }

        function aplicarBaixas(skuMap) {
          if (Object.keys(skuMap).length === 0) {
            alert('Nenhum SKU encontrado no arquivo.');
            setImporting(false);
            return;
          }
          supabase.from('estoque').select('id, sku, unidades').limit(10000).then(function(result) {
            var promises = [];
            var naoEncontrados = [];
            var dbItems = (result.data || []).map(function(x) {
              return { id: x.id, sku: x.sku, unidades: x.unidades, norm: normSku(x.sku) };
            });

            Object.keys(skuMap).forEach(function(skuNorm) {
              var item = dbItems.find(function(x) {
                return x.norm === skuNorm || skuNorm.endsWith(x.norm) || x.norm.endsWith(skuNorm);
              });
              if (item) {
                var novaQtd = Math.max(0, item.unidades - skuMap[skuNorm]);
                promises.push(supabase.from('estoque').update({unidades: novaQtd}).eq('id', item.id));
              } else {
                naoEncontrados.push(skuNorm);
              }
            });

            if (promises.length === 0) {
              alert('⚠️ Nenhum SKU encontrado no estoque!\nSKUs buscados: ' + Object.keys(skuMap).join(', '));
              setImporting(false);
              return;
            }

            Promise.all(promises).then(function() {
              var msg = '✓ ' + promises.length + ' SKU(s) com baixa aplicada!';
              if (naoEncontrados.length > 0) {
                msg += '\n⚠️ Não encontrados no estoque: ' + naoEncontrados.join(', ');
              }
              alert(msg);
              carregarEstoque();
              setImporting(false);
            });
          });
        }

        var reader = new FileReader();

        if (file.name && file.name.toLowerCase().endsWith('.pdf')) {
          reader.onload = function(e) {
            try {
              pdfjsLib.getDocument({
                data: e.target.result,
                cMapUrl: 'https://unpkg.com/pdfjs-dist@3.11.174/cmaps/',
                cMapPacked: true
              }).promise.then(function(pdf) {
                var pagePromises = [];
                for (var p = 1; p <= pdf.numPages; p++) {
                  pagePromises.push(pdf.getPage(p).then(function(page) {
                    return page.getTextContent();
                  }));
                }
                return Promise.all(pagePromises);
              }).then(function(pages) {
                var skuMap = {};

                pages.forEach(function(tc) {
                  var linhas = [];
                  var grupoAtual = [];
                  var ultimoY = null;
                  tc.items.forEach(function(item) {
                    var y = Math.round(item.transform[5]);
                    if (ultimoY !== null && Math.abs(y - ultimoY) > 3) {
                      if (grupoAtual.length) linhas.push(grupoAtual.join(' '));
                      grupoAtual = [];
                    }
                    if (item.str.trim()) grupoAtual.push(item.str.trim());
                    ultimoY = y;
                  });
                  if (grupoAtual.length) linhas.push(grupoAtual.join(' '));

                  console.log('=== LINHAS EXTRAÍDAS DO PDF ===');
                  linhas.forEach(function(l, i) { console.log(i + ': ' + l); });
                  console.log('=== FIM DAS LINHAS ===');

                  var skuEntries = [];
                  linhas.forEach(function(linha, idx) {
                    var m = /SKU:\s*(.+)/i.exec(linha);
                    if (!m) return;
                    var content = m[1].trim();
                    for (var ni = idx + 1; ni < Math.min(linhas.length, idx + 4); ni++) {
                      if (!/[:+]\s*$/.test(content)) break;
                      var next = linhas[ni].trim();
                      if (/^(Código|SKU:|Etiquetagem|PRODUTO)/i.test(next)) break;
                      content += ' ' + next;
                    }
                    skuEntries.push(content);
                    console.log('SKU #' + skuEntries.length + ': [' + content + ']');
                  });

                  var tableIdx = -1;
                  for (var ti = 0; ti < linhas.length; ti++) {
                    if (/PRODUTO.*UNIDADES/i.test(linhas[ti])) { tableIdx = ti; break; }
                  }
                  var qtys = [];
                  if (tableIdx >= 0) {
                    for (var ti = tableIdx + 1; ti < linhas.length; ti++) {
                      var t = linhas[ti].trim();
                      var n = 0;
                      if (/^\d{1,4}$/.test(t)) {
                        n = parseInt(t);
                      } else {
                        var mm = /^(\d{1,4})\s/.exec(t);
                        if (mm) n = parseInt(mm[1]);
                      }
                      if (n > 0 && !(n >= 1900 && n <= 2099)) qtys.push(n);
                    }
                  }
                  console.log('Quantidades da tabela:', qtys);

                  skuEntries.forEach(function(skuContent, i) {
                    var qty = qtys[i] || 0;
                    if (!qty) { console.log('SKU #' + (i+1) + ' sem quantidade, pulando'); return; }

                    if (/^KIT:/i.test(skuContent)) {
                      var kitStr = skuContent.replace(/^KIT:\s*/i, '').trim();
                      kitStr.split(/\s*\+\s*(?!\d)/).forEach(function(parte) {
                        parte = parte.trim();
                        if (!parte) return;
                        var qtdPorKit = 1;
                        var matchUN = /[^A-Z0-9]\s*(\d+)\s*UN\s*$/i.exec(parte);
                        if (matchUN) {
                          qtdPorKit = parseInt(matchUN[1]);
                          parte = parte.substring(0, matchUN.index).trim();
                        }
                        var sku = extrairSku(parte);
                        if (sku) skuMap[sku] = (skuMap[sku] || 0) + (qtdPorKit * qty);
                      });
                    } else {
                      var skuExtraido = extrairSku(skuContent);
                      if (skuExtraido) skuMap[skuExtraido] = (skuMap[skuExtraido] || 0) + qty;
                    }
                  });
                });

                aplicarBaixas(skuMap);
              }).catch(function(err) {
                alert('Erro ao ler PDF: ' + err.message);
                setImporting(false);
              });
            } catch (err) {
              alert('Erro ao processar PDF: ' + err.message);
              setImporting(false);
            }
          };
          reader.readAsArrayBuffer(file);

        } else {
          reader.onload = function(e) {
            try {
              var workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
              var sheet = workbook.Sheets[workbook.SheetNames[0]];
              var rows = XLSX.utils.sheet_to_json(sheet, {header: 1});
              var skuMap = {};

              rows.forEach(function(row) {
                if (!row[0] || !row[1]) return;
                var desc = String(row[0]).trim().toUpperCase();
                if (desc === 'SKU' || desc === 'DESCRIÇÃO' || desc === 'PRODUTO') return;
                var qty = parseInt(row[1]) || 0;
                if (qty <= 0) return;

                if (desc.startsWith('KIT:')) {
                  var kitStr = desc.substring(4).trim();
                  kitStr.split(/\s*\+\s*(?!\d)/).forEach(function(p) {
                    p = p.trim();
                    var qtdPorKit = 1;
                    var matchUN = /[^A-Z0-9]\s*(\d+)\s*UN\s*$/i.exec(p);
                    if (matchUN) {
                      qtdPorKit = parseInt(matchUN[1]);
                      p = p.substring(0, matchUN.index).trim();
                    }
                    var s = extrairSku(p);
                    if (s) skuMap[s] = (skuMap[s] || 0) + (qtdPorKit * qty);
                  });
                } else {
                  var s = extrairSku(desc);
                  if (s) skuMap[s] = (skuMap[s] || 0) + qty;
                }
              });

              aplicarBaixas(skuMap);
            } catch (err) {
              alert('Erro ao processar Excel: ' + err.message);
              setImporting(false);
            }
          };
          reader.readAsArrayBuffer(file);
        }
      }

      function processarEnviosFull(file) {
        setImporting(true);
        setPendingChanges(null);

        function normStr(s) {
          return String(s).toUpperCase().replace(/\s+/g, '').replace(/[^A-Z0-9]/g, '');
        }

        var reader = new FileReader();
        reader.onload = function(evt) {
          pdfjsLib.getDocument({
            data: evt.target.result,
            cMapUrl: 'https://unpkg.com/pdfjs-dist@3.11.174/cmaps/',
            cMapPacked: true
          }).promise.then(function(pdf) {
            var pagePromises = [];
            for (var p = 1; p <= pdf.numPages; p++) {
              pagePromises.push(
                pdf.getPage(p).then(function(page) {
                  return page.getTextContent().then(function(tc) {
                    return tc.items.map(function(item) {
                      return { str: item.str, x: Math.round(item.transform[4]), y: Math.round(item.transform[5]) };
                    });
                  });
                })
              );
            }
            return Promise.all(pagePromises);
          }).then(function(pagesItems) {
            var productEntries = [];
            var quantities = [];

            function parsePage(pageItems) {
              var items = pageItems.filter(function(i) { return i.str.trim(); });
              if (!items.length) return;

              items.sort(function(a, b) {
                if (Math.abs(a.y - b.y) > 3) return b.y - a.y;
                return a.x - b.x;
              });

              var unidItem = items.find(function(i) { return /^UNID/i.test(i.str); });
              var unidX = unidItem ? unidItem.x : 228;
              var headerY = unidItem ? unidItem.y : 9999;

              var lineMap = {};
              items.forEach(function(item) {
                if (item.x >= unidX) return;
                var key = Math.round(item.y / 2) * 2;
                if (!lineMap[key]) lineMap[key] = [];
                lineMap[key].push(item);
              });

              var sortedYs = Object.keys(lineMap).map(Number).sort(function(a, b) { return b - a; });
              var lineTexts = sortedYs.map(function(key) {
                return lineMap[key].sort(function(a, b) { return a.x - b.x; }).map(function(i) { return i.str; }).join('');
              });
              var fullText = lineTexts.join('\n');

              var skuRegex = /\bSKU\s*:\s*(.+?)(?=\bSKU\s*:|C[oó]digo\s*ML|$)/gi;
              var skuMatch;
              while ((skuMatch = skuRegex.exec(fullText)) !== null) {
                var skuFull = skuMatch[1].trim().replace(/\n[A-Z\d][\s\S]*$/m, '').replace(/\n/g, ' ').replace(/\s+/g, ' ');
                if (!skuFull) continue;

                if (/^KIT\s*:/i.test(skuFull)) {
                  var inner = skuFull.replace(/^KIT\s*:\s*/i, '');
                  var mM = /^([A-Z0-9]+)\s*:\s*/i.exec(inner);
                  if (mM) {
                    var kitMarca = normStr(mM[1]);
                    var parts = inner.substring(mM[0].length).split(/\s*\+\s*/);
                    productEntries.push({
                      isKit: true,
                      items: parts.map(function(p) { return p.replace(/\s*\d+\s*UN\s*$/i, '').trim(); })
                        .filter(Boolean).map(function(p) { return { marca: kitMarca, sku: normStr(p) }; })
                    });
                  }
                } else {
                  var sM = /^([A-Z0-9]+)\s*:\s*(.+)$/i.exec(skuFull);
                  if (sM) {
                    productEntries.push({ isKit: false, items: [{ marca: normStr(sM[1]), sku: normStr(sM[2]) }] });
                  }
                }
              }

              items.forEach(function(item) {
                if (item.y >= headerY) return;
                if (Math.abs(item.x - unidX) > 40) return;
                if (/^\d{1,4}$/.test(item.str.trim())) {
                  quantities.push(parseInt(item.str));
                }
              });
            }

            pagesItems.forEach(function(pageItems) { parsePage(pageItems); });

            console.log('Produtos extraídos:', productEntries.length, JSON.stringify(productEntries));
            console.log('Quantidades extraídas:', quantities);

            if (productEntries.length === 0) {
              alert('Nenhum SKU encontrado no PDF.');
              setImporting(false);
              return;
            }

            var dbItems = estoque.map(function(x) {
              return { id: x.id, marca: normStr(x.marca), sku: normStr(x.sku), marcaOrig: x.marca, skuOrig: x.sku, unidades: x.unidades };
            });

            var changeMap = {};
            var naoEncontrados = [];

            productEntries.forEach(function(product, idx) {
              var qty = quantities[idx] || 0;
              product.items.forEach(function(pi) {
                var dbItem = dbItems.find(function(d) { return d.marca === pi.marca && d.sku === pi.sku; });
                if (!dbItem) dbItem = dbItems.find(function(d) { return d.sku === pi.sku; });
                if (!dbItem) dbItem = dbItems.find(function(d) { return d.sku.endsWith(pi.sku) || pi.sku.endsWith(d.sku); });

                if (dbItem) {
                  if (changeMap[dbItem.id]) {
                    changeMap[dbItem.id].baixa += qty;
                    changeMap[dbItem.id].novoEstoque = Math.max(0, changeMap[dbItem.id].estoqueAtual - changeMap[dbItem.id].baixa);
                  } else {
                    changeMap[dbItem.id] = { id: dbItem.id, marca: dbItem.marcaOrig, sku: dbItem.skuOrig, estoqueAtual: dbItem.unidades, baixa: qty, novoEstoque: Math.max(0, dbItem.unidades - qty) };
                  }
                } else {
                  naoEncontrados.push(pi.marca + ': ' + pi.sku + (qty > 0 ? ' (qty: ' + qty + ')' : ''));
                }
              });
            });

            var changes = Object.keys(changeMap).map(function(k) { return changeMap[k]; });
            setPendingChanges({ changes: changes, naoEncontrados: naoEncontrados });
            setImporting(false);
          }).catch(function(err) {
            alert('Erro ao ler PDF: ' + err.message);
            setImporting(false);
          });
        };
        reader.readAsArrayBuffer(file);
      }

      function confirmarBaixas() {
        if (!pendingChanges) return;
        setImporting(true);
        Promise.all(pendingChanges.changes.map(function(c) {
          return supabase.from('estoque').update({ unidades: c.novoEstoque }).eq('id', c.id);
        })).then(function() {
          setPendingChanges(null);
          carregarEstoque();
          setImporting(false);
          alert('✓ Baixas confirmadas e aplicadas com sucesso!');
        }).catch(function(err) {
          alert('Erro: ' + err.message);
          setImporting(false);
        });
      }

      var estoquesFiltrados = estoque.filter(function(item) {
        var termo = searchTerm.toUpperCase();
        return item.marca.toUpperCase().includes(termo) || item.sku.toUpperCase().includes(termo);
      });

      if (loading) {
        return e('div', {className: 'min-h-screen flex flex-col items-center justify-center'},
          e('div', {className: 'text-2xl font-bold text-blue-400 mb-2'}, 'Carregando...'),
          e('div', {className: 'text-slate-400'}, 'Conectando ao banco de dados')
        );
      }

      return e('div', {className: 'min-h-screen'},
        e('header', {className: 'bg-slate-950 border-b border-slate-700 sticky top-0 z-50'},
          e('div', {className: 'max-w-7xl mx-auto px-4 py-4'},
            e('div', {className: 'flex items-center gap-3 mb-4'},
              e('div', {className: 'bg-blue-600 px-3 py-1 rounded-lg'},
                e('span', {className: 'text-white font-bold text-sm'}, '[E]')
              ),
              e('h1', {className: 'text-xl font-bold text-white'}, 'Sistema de Estoque'),
              e('span', {className: 'text-slate-400 text-sm'}, '— Tempo real')
            ),
            e('div', {className: 'flex gap-3'},
              e(StatsCard, {numero: stats.total, label: 'SKUs', cor: 'bg-blue-600'}),
              e(StatsCard, {numero: stats.unidades, label: 'Unidades', cor: 'bg-green-600'}),
              e(StatsCard, {numero: stats.zerados, label: 'Zerados', cor: 'bg-red-600'})
            )
          )
        ),

        e('div', {className: 'bg-slate-800 border-b border-slate-700'},
          e('div', {className: 'max-w-7xl mx-auto px-4 flex overflow-x-auto'},
            e('button', {
              onClick: function() { setActiveTab('sku'); },
              className: 'py-4 px-6 font-bold text-sm transition-colors whitespace-nowrap ' + (activeTab === 'sku' ? 'text-blue-400 border-b-2 border-blue-400' : 'text-slate-400 hover:text-white')
            }, '> Busca'),
            e('button', {
              onClick: function() { setActiveTab('registro'); },
              className: 'py-4 px-6 font-bold text-sm transition-colors whitespace-nowrap ' + (activeTab === 'registro' ? 'text-blue-400 border-b-2 border-blue-400' : 'text-slate-400 hover:text-white')
            }, '+ Registro'),
            e('button', {
              onClick: function() { setActiveTab('importar'); },
              className: 'py-4 px-6 font-bold text-sm transition-colors whitespace-nowrap ' + (activeTab === 'importar' ? 'text-blue-400 border-b-2 border-blue-400' : 'text-slate-400 hover:text-white')
            }, '📊 Importar SKUs'),
            e('button', {
              onClick: function() { setActiveTab('envios'); },
              className: 'py-4 px-6 font-bold text-sm transition-colors whitespace-nowrap ' + (activeTab === 'envios' ? 'text-blue-400 border-b-2 border-blue-400' : 'text-slate-400 hover:text-white')
            }, '🚚 Envios Full')
          )
        ),

        e('main', {className: 'max-w-7xl mx-auto px-4 py-6'},
          activeTab === 'sku' && e('div', null,
            e('div', {className: 'mb-5'},
              e('input', {
                type: 'text',
                placeholder: 'Digite o SKU ou marca...',
                value: searchTerm,
                onChange: function(ev) { setSearchTerm(ev.target.value); },
                className: 'w-full bg-slate-800 text-white px-4 py-3 rounded-lg border border-slate-600 focus:border-blue-400 focus:outline-none text-sm'
              }),
              e('div', {className: 'text-sm text-slate-400 mt-2'},
                'Exibindo ' + estoquesFiltrados.length + ' de ' + stats.total + ' produtos'
              )
            ),
            estoquesFiltrados.length === 0
              ? e('div', {className: 'text-center py-16 text-slate-500'},
                  e('div', {className: 'text-4xl mb-3'}, '[]'),
                  e('div', null, 'Nenhum produto encontrado')
                )
              : e('div', {className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4'},
                  estoquesFiltrados.map(function(item) {
                    return e(SKUCard, {
                      key: item.id,
                      item: item,
                      onDelete: deletarSKU,
                      onSaida: function(item, qty) { fazerMovimento(item, qty, 'saida'); },
                      onEntrada: function(item, qty) { fazerMovimento(item, qty, 'entrada'); }
                    });
                  })
                )
          ),

          activeTab === 'registro' && e('div', {className: 'space-y-5'},
            e('div', {className: 'bg-slate-800 border border-slate-700 p-6 rounded-lg'},
              e('h2', {className: 'text-lg font-bold mb-4'}, 'Adicionar SKU Individual'),
              e('div', {className: 'grid grid-cols-1 md:grid-cols-4 gap-3'},
                e('input', {
                  type: 'text',
                  placeholder: 'MARCA',
                  value: novaMarca,
                  onChange: function(ev) { setNovaMarca(ev.target.value); },
                  className: 'bg-slate-700 text-white px-4 py-2 rounded border border-slate-600 focus:border-blue-400 focus:outline-none text-sm'
                }),
                e('input', {
                  type: 'text',
                  placeholder: 'SKU',
                  value: novoSku,
                  onChange: function(ev) { setNovoSku(ev.target.value); },
                  className: 'bg-slate-700 text-white px-4 py-2 rounded border border-slate-600 focus:border-blue-400 focus:outline-none text-sm'
                }),
                e('input', {
                  type: 'number',
                  placeholder: 'Unidades',
                  value: novasUnidades,
                  onChange: function(ev) { setNovasUnidades(parseInt(ev.target.value) || 0); },
                  className: 'bg-slate-700 text-white px-4 py-2 rounded border border-slate-600 focus:border-blue-400 focus:outline-none text-sm'
                }),
                e('button', {
                  onClick: adicionarSKU,
                  className: 'bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-bold text-sm transition'
                }, '+ Adicionar')
              )
            )
          ),

          activeTab === 'importar' && e('div', {className: 'space-y-5'},
            e('div', {className: 'bg-slate-800 border border-slate-700 p-6 rounded-lg'},
              e('h2', {className: 'text-lg font-bold mb-2'}, 'Importar Planilha de SKUs'),
              e('p', {className: 'text-slate-400 text-sm mb-4'}, 'Formato: Cada aba é uma marca. Coluna A = SKU, Coluna B = Quantidade'),
              e('input', {
                type: 'file',
                accept: '.xlsx,.xls',
                onChange: function(ev) {
                  if (ev.target.files && ev.target.files[0]) {
                    importarSKUsExcel(ev.target.files[0]);
                  }
                },
                disabled: importing,
                className: 'block w-full px-4 py-2 rounded border border-slate-600 text-sm'
              }),
              e('p', {className: 'text-slate-500 text-xs mt-2'}, importing ? '⏳ Processando...' : '✓ Pronto para importar')
            )
          ),

          activeTab === 'envios' && e('div', {className: 'space-y-4'},
            !pendingChanges
              ? e('div', {className: 'bg-slate-800 border border-slate-700 p-6 rounded-lg'},
                  e('h2', {className: 'text-lg font-bold mb-2'}, '🚚 Envios Full — Baixa Automática'),
                  e('p', {className: 'text-slate-400 text-sm mb-4'}, 'Selecione o PDF de preparação do Mercado Livre Full. O sistema mostrará todas as alterações para você revisar antes de confirmar.'),
                  e('input', {
                    type: 'file',
                    accept: '.pdf',
                    onChange: function(ev) {
                      if (ev.target.files && ev.target.files[0]) processarEnviosFull(ev.target.files[0]);
                    },
                    disabled: importing,
                    className: 'block w-full px-4 py-2 rounded border border-slate-600 text-sm'
                  }),
                  e('p', {className: 'text-slate-500 text-xs mt-2'}, importing ? '⏳ Lendo PDF...' : '✓ Pronto para importar')
                )
              : e('div', {className: 'space-y-4'},
                  e('div', {className: 'bg-slate-800 border border-slate-700 p-4 rounded-lg flex justify-between items-center'},
                    e('div', null,
                      e('div', {className: 'font-bold text-lg'}, '📋 Confirmar Baixas'),
                      e('div', {className: 'text-slate-400 text-sm mt-1'},
                        pendingChanges.changes.length + ' SKU(s) serão atualizados' +
                        (pendingChanges.naoEncontrados.length > 0 ? ' · ⚠️ ' + pendingChanges.naoEncontrados.length + ' não encontrado(s)' : ' · ✓ Todos os SKUs encontrados')
                      )
                    ),
                    e('div', {className: 'flex gap-3'},
                      e('button', {
                        onClick: function() { setPendingChanges(null); },
                        className: 'bg-slate-600 hover:bg-slate-500 text-white px-4 py-2 rounded font-bold text-sm transition'
                      }, 'Cancelar'),
                      e('button', {
                        onClick: confirmarBaixas,
                        disabled: importing,
                        className: 'bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded font-bold text-sm transition'
                      }, importing ? '⏳ Aplicando...' : '✓ Confirmar Baixas')
                    )
                  ),
                  e('div', {className: 'bg-slate-800 border border-slate-700 rounded-lg overflow-hidden'},
                    e('table', {className: 'w-full text-sm'},
                      e('thead', null,
                        e('tr', {className: 'bg-slate-700 text-slate-300 text-xs uppercase'},
                          e('th', {className: 'text-left px-4 py-3'}, 'Marca'),
                          e('th', {className: 'text-left px-4 py-3'}, 'SKU'),
                          e('th', {className: 'text-center px-4 py-3'}, 'Estoque Atual'),
                          e('th', {className: 'text-center px-4 py-3 text-red-400'}, '− Baixa'),
                          e('th', {className: 'text-center px-4 py-3 text-green-400'}, 'Novo Estoque')
                        )
                      ),
                      e('tbody', null,
                        pendingChanges.changes.map(function(c, i) {
                          return e('tr', {key: i, className: i % 2 === 0 ? 'border-t border-slate-700' : 'border-t border-slate-700 bg-slate-900'},
                            e('td', {className: 'px-4 py-2 text-slate-400 text-xs'}, c.marca),
                            e('td', {className: 'px-4 py-2 font-bold'}, c.sku),
                            e('td', {className: 'px-4 py-2 text-center text-slate-300'}, c.estoqueAtual),
                            e('td', {className: 'px-4 py-2 text-center text-red-400 font-bold'}, '−' + c.baixa),
                            e('td', {className: 'px-4 py-2 text-center font-bold ' + (c.novoEstoque === 0 ? 'text-red-400' : 'text-green-400')}, c.novoEstoque)
                          );
                        })
                      )
                    )
                  ),
                  pendingChanges.naoEncontrados.length > 0 && e('div', {className: 'space-y-2'},
                    e('div', {className: 'text-yellow-400 font-bold text-sm px-1'},
                      '⚠️ Não cadastrados no estoque — precisam ser registrados (' + pendingChanges.naoEncontrados.length + '):'
                    ),
                    e('div', {className: 'bg-slate-800 border border-yellow-600 rounded-lg overflow-hidden'},
                      e('table', {className: 'w-full text-sm'},
                        e('thead', null,
                          e('tr', {className: 'bg-yellow-900 bg-opacity-60 text-yellow-300 text-xs uppercase'},
                            e('th', {className: 'text-left px-4 py-3'}, 'Marca'),
                            e('th', {className: 'text-left px-4 py-3'}, 'SKU'),
                            e('th', {className: 'text-center px-4 py-3'}, 'Qtd no Envio')
                          )
                        ),
                        e('tbody', null,
                          pendingChanges.naoEncontrados.map(function(item, i) {
                            var partes = item.match(/^([^:]+):\s*([^(]+)\s*\(qty:\s*(\d+)\)/);
                            var marca = partes ? partes[1].trim() : '?';
                            var sku = partes ? partes[2].trim() : item;
                            var qty = partes ? partes[3] : '?';
                            return e('tr', {key: i, className: 'border-t border-slate-700'},
                              e('td', {className: 'px-4 py-2 text-yellow-300 text-xs'}, marca),
                              e('td', {className: 'px-4 py-2 font-bold text-yellow-200'}, sku),
                              e('td', {className: 'px-4 py-2 text-center text-yellow-300 font-bold'}, qty)
                            );
                          })
                        )
                      )
                    )
                  )
                )
          ),

        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(e(App, null));
  </script>
</body>
</html>
