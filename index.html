    function getCorLoja(nome, idx) {
      var n = (nome || '').toUpperCase();
      if (n.indexOf('KMP') !== -1 || n.indexOf('KARMA') !== -1)
        return {bg: 'bg-blue-500', text: 'text-white'};
      if (n.indexOf('ERP') !== -1 || n.indexOf('ERUP') !== -1)
        return {bg: 'bg-orange-500', text: 'text-white'};
      if (n.indexOf('LOT') !== -1 || n.indexOf('LTS') !== -1)
        return {bg: 'bg-yellow-400', text: 'text-gray-900'};
      return LOJA_CORES_FALLBACK[idx % LOJA_CORES_FALLBACK.length];
    }

    function SKUCard(props) {
      var item = props.item;
      var lojas = props.lojas || [];
      var isZerado = item.unidades === 0;
      var borderColor = isZerado ? 'border-l-4 border-red-400 bg-red-50' : 'border-l-4 border-green-400 bg-green-50';

      var mk = item.marca ? item.marca.toUpperCase().replace(/\s+/g, '').replace(/[^A-Z0-9]/g, '') : '';
      var sk = item.sku   ? item.sku.toUpperCase().replace(/\s+/g, '').replace(/[^A-Z0-9]/g, '')   : '';

      return e('div', {className: borderColor + ' p-4 rounded-lg text-gray-800 shadow'},
        // Linha superior: marca/SKU à esquerda, badges + x à direita
        e('div', {className: 'flex justify-between items-start mb-2'},
          e('div', null,
            e('div', {className: 'text-xs text-gray-500 font-semibold uppercase'}, item.marca),

      function carregarEstoque() {
        var batchSize = 1000;
        var allData = [];

        function fetchBatch(from) {
          return supabase.from('estoque').select('*')
            .order('marca', {ascending: true})
            .order('sku', {ascending: true})
            .range(from, from + batchSize - 1)
            .then(function(result) {
              if (result.error) throw result.error;
              var data = result.data || [];
              allData = allData.concat(data);
              if (data.length === batchSize) return fetchBatch(from + batchSize);
              return allData;
            });
        }

        fetchBatch(0).then(function(data) {
          setEstoque(data);
          var total = data.length;
          var totalUnidades = data.reduce(function(sum, item) { return sum + (item.unidades || 0); }, 0);
          var zerados = data.filter(function(item) { return item.unidades === 0; }).length;
          setStats({total: total, unidades: totalUnidades, zerados: zerados});
          setLoading(false);
        }).catch(function(err) {
          console.error('Erro de conexão:', err);
          setLoading(false);
        });
      }

      function carregarLojasML() {
        supabase.from('ml_lojas').select('*').order('idx').then(function(result) {
          if (result.error || !result.data) return;
          setMlLojas(result.data.map(function(row) {
            return { nome: row.nome, skuSet: row.sku_set, idx: row.idx };
          }));
        });
      }

      useEffect(function() {
        carregarEstoque();
        carregarLojasML();
        carregarPrecos();
        carregarMarkups();
        var subscription = supabase
          .channel('estoque-realtime')
          .on('postgres_changes', {event: '*', schema: 'public', table: 'estoque'}, function() {
            carregarEstoque();

        return function() { subscription.unsubscribe(); };

      function adicionarSKU() {
        if (!novaMarca.trim() || !novoSku.trim()) {
          alert('Preencha a Marca e o SKU!');
          return;
        }
        supabase.from('estoque').insert([{
          marca: novaMarca.trim().toUpperCase(),
          sku: novoSku.trim().toUpperCase(),
          unidades: novasUnidades
        }]).then(function(result) {
          if (result.error) { alert('Erro: ' + result.error.message); return; }
          setNovaMarca('');
          setNovoSku('');
          setNovasUnidades(0);
          carregarEstoque();
        });
      }

      function deletarSKU(id) {
        if (!confirm('Deletar este SKU?')) return;
        supabase.from('estoque').delete().eq('id', id).then(function(result) {
          if (result.error) { alert('Erro: ' + result.error.message); return; }
          carregarEstoque();
        });
      }

      function fazerMovimento(item, quantidade, tipo) {
        var novaQtd = tipo === 'entrada'
          ? item.unidades + quantidade
          : Math.max(0, item.unidades - quantidade);
        supabase.from('estoque').update({unidades: novaQtd}).eq('id', item.id).then(function(result) {
          if (result.error) { alert('Erro: ' + result.error.message); return; }
          carregarEstoque();
        });
      }

      function importarSKUsExcel(file) {
        setImporting(true);
        var reader = new FileReader();
        reader.onload = function(e) {
          try {
            var data = new Uint8Array(e.target.result);
            var workbook = XLSX.read(data, {type: 'array'});
            var skusDaPlanilha = [];

            workbook.SheetNames.forEach(function(sheetName) {
              var sheet = workbook.Sheets[sheetName];
              var rows = XLSX.utils.sheet_to_json(sheet, {header: 1});

              rows.forEach(function(row, idx) {
                if (idx < 1) return;
                if (row[0] === null || row[0] === undefined || row[1] === null || row[1] === undefined) return;

                var sku = String(row[0]).trim().toUpperCase();
                var unidades = parseInt(row[1]) || 0;

                if (sku && sku !== 'SKU') {
                  skusDaPlanilha.push({
                    marca: sheetName.trim().toUpperCase(),
                    sku: sku,
                    unidades: unidades
                  });
                }
              });
            });

            if (skusDaPlanilha.length === 0) {
              alert('Nenhum SKU encontrado no arquivo');
              setImporting(false);
              return;
            }

            // Remove duplicatas da planilha (mantém o último por marca+sku)
            var deduped = {};
            skusDaPlanilha.forEach(function(item) {
              deduped[item.marca + '|' + item.sku] = item;
            });
            var skusUnicos = Object.keys(deduped).map(function(k) { return deduped[k]; });

            // Compara com o banco: INSERT novos, UPDATE existentes
            var existentes = estoque.map(function(x) {
              return { id: x.id, marca: (x.marca||'').toUpperCase(), sku: (x.sku||'').toUpperCase() };
            });

            var paraInserir = [];
            var paraAtualizar = [];
            skusUnicos.forEach(function(item) {
              var found = existentes.find(function(e) {
                return e.marca === item.marca && e.sku === item.sku;
              });
              if (found) {
                paraAtualizar.push({ id: found.id, unidades: item.unidades });
              } else {
                paraInserir.push(item);
              }
            });

            var ops = [];
            // Inserir novos em lotes
            var chunkSize = 500;
            for (var ci = 0; ci < paraInserir.length; ci += chunkSize) {
              ops.push(supabase.from('estoque').insert(paraInserir.slice(ci, ci + chunkSize)));
            }
            // Atualizar existentes um a um (necessário para update com id)
            paraAtualizar.forEach(function(item) {
              ops.push(supabase.from('estoque').update({ unidades: item.unidades }).eq('id', item.id));
            });

            if (ops.length === 0) {
              alert('Nenhuma alteração para aplicar.');
              setImporting(false);
              return;
            }

            Promise.all(ops).then(function(results) {
              var err = results.find(function(r) { return r.error; });
              if (err) {
                alert('Erro na importação: ' + err.error.message);
                setImporting(false);
                return;
              }
              alert('✓ ' + paraInserir.length + ' inseridos e ' + paraAtualizar.length + ' atualizados com sucesso!');
              carregarEstoque();
              setImporting(false);
            });
          } catch (err) {
            alert('Erro ao processar arquivo: ' + err.message);
            setImporting(false);
          }
        };
        reader.readAsArrayBuffer(file);
      }

      function normStr(s) {
        return String(s).toUpperCase().replace(/\s+/g, '').replace(/[^A-Z0-9]/g, '');
      }

      function parseSKUsML(celula) {
        var result = [];
        if (!celula) return result;
        var texto = String(celula).trim().toUpperCase();
        // Remove leading KIT: prefix
        texto = texto.replace(/^KIT:\s*/i, '');
        // Split by + (multiple items in kit)
        var partes = texto.split('+');
        var ultimaMarca = '';
        partes.forEach(function(parte) {
          parte = parte.trim();
          // Remove quantity suffix like "- 2UN", "- 3UN" etc
          parte = parte.replace(/\s*-\s*\d+\s*UN\s*$/i, '').trim();
          if (!parte) return;
          if (parte.indexOf(':') !== -1) {
            var idx = parte.indexOf(':');
            var marcaRaw = parte.substring(0, idx).trim();
            var skuRaw = parte.substring(idx + 1).trim();
            if (marcaRaw && skuRaw) {
              ultimaMarca = marcaRaw;
              result.push({ marca: normStr(marcaRaw), sku: normStr(skuRaw) });
            }
          } else if (parte && ultimaMarca) {
            // No marca prefix — use last seen marca
            result.push({ marca: normStr(ultimaMarca), sku: normStr(parte) });
          }
        });
        return result;
      }

      function lerSKUsDoArquivoML(file, idx) {
        // Nome da loja = nome do arquivo sem extensão (ex: KMP.xlsx → KMP)
        var nomeLoja = file.name.replace(/\.[^.]+$/, '').toUpperCase();
        var reader = new FileReader();
        reader.onload = function(evt) {
          try {
            var wb = XLSX.read(evt.target.result, { type: 'array' });
            var sheetName = wb.SheetNames.find(function(n) {
              return n.toLowerCase().indexOf('an') !== -1;
            }) || wb.SheetNames[0];
            var ws = wb.Sheets[sheetName];
            var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
            var headerRow = rows[0] || [];
            var skuColIdx = -1;
            for (var ci = 0; ci < headerRow.length; ci++) {
              if (String(headerRow[ci]).toUpperCase() === 'SKU') { skuColIdx = ci; break; }
            }
            if (skuColIdx === -1) skuColIdx = 4;
            var skuSet = {};
            for (var ri = 4; ri < rows.length; ri++) {
              var skuCell = rows[ri][skuColIdx];
              if (!skuCell) continue;
              var parsed = parseSKUsML(String(skuCell));
              parsed.forEach(function(p) { skuSet[p.marca + '|' + p.sku] = true; });
            }
            // Calcula nova lista fora do setState
            var novaLista = mlLojas.slice();
            var existe = novaLista.findIndex(function(l) { return l.nome === nomeLoja; });
            var actualIdx = existe !== -1 ? existe : Math.min(idx, novaLista.length);
            if (existe !== -1) {
              novaLista[existe] = { nome: nomeLoja, skuSet: skuSet, idx: actualIdx };
            } else {
              novaLista.push({ nome: nomeLoja, skuSet: skuSet, idx: actualIdx });
              novaLista = novaLista.map(function(l, i) { return { nome: l.nome, skuSet: l.skuSet, idx: i }; });
              actualIdx = novaLista.findIndex(function(l) { return l.nome === nomeLoja; });
            }
            // Salva no Supabase ANTES de atualizar estado
            supabase.from('ml_lojas').upsert(
              { nome: nomeLoja, sku_set: skuSet, idx: actualIdx, updated_at: new Date().toISOString() },
              { onConflict: 'nome' }
            ).then(function(res) {
              if (res.error) {
                alert('Erro ao salvar loja ML no Supabase: ' + res.error.message);
              }
            });
            setMlLojas(novaLista);
          } catch(err) {
            alert('Erro ao ler planilha do ML: ' + err.message);
          }
        };
        reader.readAsArrayBuffer(file);
      }

      function carregarPrecos() {
        supabase.from('precos').select('*').order('marca').order('sku').then(function(result) {
          if (result.error || !result.data) return;
          setPrecos(result.data);
        });
      }

      function carregarMarkups() {
        supabase.from('markup_marcas').select('*').then(function(result) {
          if (result.error || !result.data) return;
          var obj = {};
          result.data.forEach(function(row) { obj[row.marca] = Number(row.markup); });
          setMarkups(obj);
          setMarkupEdit(function(prev) {
            var n = Object.assign({}, prev);
            result.data.forEach(function(row) { n[row.marca] = String(row.markup); });
            return n;
          });
        });
      }

      function salvarMarkupMarca(marca) {
        var valor = markupEdit[marca];
        var num = parseFloat(String(valor || '').replace(',', '.'));
        if (isNaN(num) || num <= 0) { alert('Markup inválido para ' + marca); return; }
        supabase.from('markup_marcas').upsert(
          { marca: marca, markup: num },
          { onConflict: 'marca' }
        ).then(function(res) {
          if (res.error) { alert('Erro ao salvar: ' + res.error.message); return; }
          setMarkups(function(prev) { var n = Object.assign({}, prev); n[marca] = num; return n; });
        });
      }

      function importarPlanilhaCustos(file) {
        var reader = new FileReader();
        reader.onload = function(evt) {
          try {
            var wb = XLSX.read(evt.target.result, { type: 'array' });
            var todasLinhas = [];
            wb.SheetNames.forEach(function(sheetName) {
              var marca = sheetName.toUpperCase().trim();
              var ws = wb.Sheets[sheetName];
              var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
              if (!rows || rows.length < 2) return;
              var codigoCol = 0, custoCol = 1, headerIdx = 0;
              for (var i = 0; i < Math.min(rows.length, 5); i++) {
                var achou = false;
                for (var j = 0; j < rows[i].length; j++) {
                  var cell = String(rows[i][j]).toUpperCase().trim().replace(/[^A-Z]/g, '');
                  if (cell === 'CODIGO' || cell === 'COD') { codigoCol = j; achou = true; }
                  if (cell === 'CUSTO') { custoCol = j; achou = true; }
                }
                if (achou) { headerIdx = i; break; }
              }
              for (var ri = headerIdx + 1; ri < rows.length; ri++) {
                var sku = String(rows[ri][codigoCol] || '').trim().toUpperCase();
                var custoRaw = rows[ri][custoCol];
                if (!sku || sku === 'XXX' || sku === '') continue;
                var custo = parseFloat(String(custoRaw).replace(',', '.').replace(/[^0-9.]/g, ''));
                if (isNaN(custo) || custo <= 0) continue;
                todasLinhas.push({ marca: marca, sku: sku, custo: custo });
              }
            });
            if (todasLinhas.length === 0) { alert('Nenhum dado encontrado na planilha.'); return; }
            var promises = [];
            for (var i = 0; i < todasLinhas.length; i += 500) {
              promises.push(supabase.from('precos').upsert(todasLinhas.slice(i, i + 500), { onConflict: 'marca,sku' }));
            }
            Promise.all(promises).then(function(results) {
              var hasError = results.find(function(r) { return r.error; });
              if (hasError) { alert('Erro ao importar: ' + hasError.error.message); return; }
              alert('✓ ' + todasLinhas.length + ' custos importados com sucesso!');
              carregarPrecos();
              carregarMarkups();
            });
          } catch(err) {
            alert('Erro ao ler planilha: ' + err.message);
          }
        };
        reader.readAsArrayBuffer(file);
      }

      function removerLojaML(nome) {
        supabase.from('ml_lojas').delete().eq('nome', nome).then(function(res) {
          if (res.error) { alert('Erro ao remover loja ML: ' + res.error.message); return; }
          setMlLojas(function(prev) {
            return prev.filter(function(l) { return l.nome !== nome; })
                       .map(function(l, i) { return { nome: l.nome, skuSet: l.skuSet, idx: i }; });
          });
        });
      }

      function exportarNaoAnunciados(lista, lojas) {
        var header = ['MARCA', 'SKU', 'UNIDADES'].concat(lojas.map(function(l) { return l.nome; }));
        var dados = [header].concat(
          lista.map(function(item) {
            var mk = normStr(item.marca || '');
            var sk = normStr(item.sku || '');
            var colunas = [item.marca, item.sku, item.unidades || 0];
            lojas.forEach(function(loja) {
              colunas.push(loja.skuSet[mk + '|' + sk] ? 'SIM' : 'NÃO');
            });
            return colunas;
          })
        );
        var ws = XLSX.utils.aoa_to_sheet(dados);
        var cols = [{wch: 20}, {wch: 20}, {wch: 12}];
        lojas.forEach(function() { cols.push({wch: 14}); });
        ws['!cols'] = cols;
        var wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Não Anunciados');
        XLSX.writeFile(wb, 'nao_anunciados_ml.xlsx');
      }

      function exportarEstoque() {
        if (!estoque || estoque.length === 0) {
          alert('Nenhum dado para exportar.');
          return;
        }
        var dados = [['MARCA', 'SKU', 'UNIDADES']].concat(
          estoque.slice().sort(function(a, b) {
            var ma = (a.marca || '').toUpperCase(), mb = (b.marca || '').toUpperCase();
            if (ma !== mb) return ma < mb ? -1 : 1;
            return (a.sku || '').toUpperCase() < (b.sku || '').toUpperCase() ? -1 : 1;
          }).map(function(item) {
            return [item.marca || '', item.sku || '', item.unidades || 0];
          })
        );
        var ws = XLSX.utils.aoa_to_sheet(dados);
        ws['!cols'] = [{wch: 20}, {wch: 20}, {wch: 12}];
        var wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Estoque');
        XLSX.writeFile(wb, 'estoque_completo.xlsx');
      }

      function processarEnviosFull(file) {
        setImporting(true);
        setPendingChanges(null);

        var reader = new FileReader();
        reader.onload = function(evt) {
          try {
            var wb = XLSX.read(evt.target.result, { type: 'array' });
            var ws = wb.Sheets[wb.SheetNames[0]];
            var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

            // Pula cabeçalho (linha 0) e lê as demais
            var entries = [];
            for (var i = 1; i < rows.length; i++) {
              var row = rows[i];
              var marca = normStr(String(row[0] || ''));
              var sku   = normStr(String(row[1] || ''));
              var qty   = parseInt(row[2]) || 0;
              if (marca && sku && qty > 0) {
                entries.push({ marca: marca, sku: sku, qty: qty });
              }
            }

            if (entries.length === 0) {
              alert('Nenhum item encontrado na planilha.');
              setImporting(false);
              return;
            }

            var dbItems = estoque.map(function(x) {
              return { id: x.id, marca: normStr(x.marca), sku: normStr(x.sku), marcaOrig: x.marca, skuOrig: x.sku, unidades: x.unidades };
            });

            var changeMap = {};
            var naoEncontrados = [];

            entries.forEach(function(entry) {
              var dbItem = dbItems.find(function(d) { return d.marca === entry.marca && d.sku === entry.sku; });
              if (!dbItem) dbItem = dbItems.find(function(d) { return d.sku === entry.sku; });

              if (dbItem) {
                if (changeMap[dbItem.id]) {
                  changeMap[dbItem.id].baixa += entry.qty;
                  changeMap[dbItem.id].novoEstoque = Math.max(0, changeMap[dbItem.id].estoqueAtual - changeMap[dbItem.id].baixa);
                } else {
                  changeMap[dbItem.id] = { id: dbItem.id, marca: dbItem.marcaOrig, sku: dbItem.skuOrig, estoqueAtual: dbItem.unidades, baixa: entry.qty, novoEstoque: Math.max(0, dbItem.unidades - entry.qty) };
                }
              } else {
                naoEncontrados.push(entry.marca + ': ' + entry.sku + ' (qty: ' + entry.qty + ')');
              }
            });

            var changes = Object.keys(changeMap).map(function(k) { return changeMap[k]; });
            setPendingChanges({ changes: changes, naoEncontrados: naoEncontrados });
            setImporting(false);
          } catch(err) {
            alert('Erro ao ler planilha: ' + err.message);
            setImporting(false);
          }
        };
        reader.readAsArrayBuffer(file);
      }

                        marcas.sort();
                        return marcas.map(function(marca) {
                          var val = markupEdit[marca] !== undefined ? markupEdit[marca] : (markups[marca] || 60);
                          return e('div', {key: marca, className: 'bg-slate-700 rounded-lg p-3'},
                            e('div', {className: 'text-xs font-bold text-slate-300 mb-2 truncate'}, marca),
                            e('div', {className: 'flex items-center gap-1'},
                              e('input', {
                                type: 'number', min: '1', max: '999',
                                value: val,
                                onChange: function(ev) {
                                  var v = ev.target.value;
                                  setMarkupEdit(function(prev) { var n = Object.assign({}, prev); n[marca] = v; return n; });
                                },
                                className: 'w-14 bg-slate-600 border border-slate-500 text-white text-sm px-2 py-1 rounded outline-none text-center'
                              }),
                              e('span', {className: 'text-slate-400 text-sm'}, '%'),
                              e('button', {
                                onClick: function() { salvarMarkupMarca(marca); },
                                className: 'ml-1 bg-blue-600 hover:bg-blue-500 text-white text-xs px-2 py-1 rounded font-bold transition-colors'
                              }, '✓')
                            )
                          );
                        });
                      })()
                    )
              )
            ),

            // Busca e grid de preços
            e('div', null,
              e('input', {
                type: 'text',
                placeholder: 'Digite o SKU ou marca...',
                value: precosSearch,
                onChange: function(ev) { setPrecosSearch(ev.target.value); },
                className: 'w-full bg-slate-800 border border-slate-700 text-white px-4 py-3 rounded-lg text-sm outline-none focus:border-blue-500 transition-colors mb-3'
              }),
              (function() {
                var term = precosSearch.trim().toUpperCase();
                var filtrados = precos.filter(function(p) {
                  if (!term) return true;
                  return p.marca.toUpperCase().indexOf(term) !== -1 || p.sku.toUpperCase().indexOf(term) !== -1;
                });
                if (precos.length === 0) return e('p', {className: 'text-slate-500 text-sm text-center py-10'}, 'Nenhum custo cadastrado. Importe a planilha para começar.');
                return e('div', null,
                  e('p', {className: 'text-slate-500 text-xs mb-4'}, 'Exibindo ' + filtrados.length + ' de ' + precos.length + ' produtos'),
                  e('div', {className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4'},
                    filtrados.map(function(p) {
                      var markup = markups[p.marca] !== undefined ? markups[p.marca] : 60;
                      var precoFinal = p.custo * (1 + markup / 100);
                      var fmt = function(n) { return 'R$ ' + n.toFixed(2).replace('.', ','); };
                      return e('div', {key: p.marca + '|' + p.sku,
                        className: 'bg-slate-800 border border-slate-700 rounded-lg p-4 hover:border-slate-500 transition-colors'},
                        e('div', {className: 'text-xs text-slate-500 font-bold uppercase tracking-wider mb-1'}, p.marca),
                        e('div', {className: 'text-lg font-bold text-white mb-3'}, p.sku),
                        e('div', {className: 'flex items-center justify-between mb-1'},
                          e('span', {className: 'text-xs text-slate-400'}, 'Custo'),
                          e('span', {className: 'text-sm text-slate-300 font-medium'}, fmt(p.custo))
                        ),
                        e('div', {className: 'flex items-center justify-between mb-3'},
                          e('span', {className: 'text-xs text-slate-400'}, 'Markup'),
                          e('span', {className: 'text-xs bg-slate-700 text-blue-400 px-2 py-0.5 rounded font-bold'}, '+' + markup + '%')
                        ),
                        e('div', {className: 'border-t border-slate-700 pt-3 flex items-center justify-between'},
                          e('span', {className: 'text-sm font-bold text-slate-300'}, 'Preço Final'),
                          e('span', {className: 'text-xl font-black text-green-400'}, fmt(precoFinal))
                        )
                      );
                    })
                  )
                );
              })()
            )
          ),

        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(e(App, null));
  </script>
</body>
</html>
