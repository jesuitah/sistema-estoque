    function getCorLoja(nome, idx) {
      var n = (nome || '').toUpperCase();
      if (n.indexOf('KMP') !== -1 || n.indexOf('KARMA') !== -1)
        return {bg: 'bg-blue-500', text: 'text-white'};
      if (n.indexOf('ERP') !== -1 || n.indexOf('ERUP') !== -1)
        return {bg: 'bg-orange-500', text: 'text-white'};
      if (n.indexOf('LOT') !== -1 || n.indexOf('LTS') !== -1)
        return {bg: 'bg-yellow-400', text: 'text-gray-900'};
      return LOJA_CORES_FALLBACK[idx % LOJA_CORES_FALLBACK.length];
    }

      function carregarEstoque() {
        var batchSize = 1000;
        var allData = [];

        function fetchBatch(from) {
          return supabase.from('estoque').select('*')
            .order('marca', {ascending: true})
            .order('sku', {ascending: true})
            .range(from, from + batchSize - 1)
            .then(function(result) {
              if (result.error) throw result.error;
              var data = result.data || [];
              allData = allData.concat(data);
              if (data.length === batchSize) return fetchBatch(from + batchSize);
              return allData;
            });
        }

        fetchBatch(0).then(function(data) {
          setEstoque(data);
          var total = data.length;
          var totalUnidades = data.reduce(function(sum, item) { return sum + (item.unidades || 0); }, 0);
          var zerados = data.filter(function(item) { return item.unidades === 0; }).length;
          setStats({total: total, unidades: totalUnidades, zerados: zerados});
          setLoading(false);
        }).catch(function(err) {
          console.error('Erro de conexão:', err);
          setLoading(false);
        });
      }

      function adicionarSKU() {
        var marca = novaMarca.trim().toUpperCase();
        var sku = novoSku.trim().toUpperCase();
        if (!marca || !sku) { alert('Preencha a Marca e o SKU!'); return; }
        var custo = parseFloat(String(novoCusto || '').replace(',', '.')) || 0;

        // Verifica se já existe em estoque e precos antes de inserir
        Promise.all([
          supabase.from('estoque').select('id').eq('sku', sku).maybeSingle(),
          supabase.from('precos').select('id').eq('marca', marca).eq('sku', sku).maybeSingle()
        ]).then(function(results) {
          var estoqueExiste = results[0].data;
          var precosExiste = results[1].data;
          var ops = [];

          if (!estoqueExiste) {
            ops.push(supabase.from('estoque').insert([{ marca: marca, sku: sku, unidades: novasUnidades }]));
          }
          if (!precosExiste) {
            ops.push(supabase.from('precos').insert([{ marca: marca, sku: sku, custo: custo }]));
          }

          if (ops.length === 0) {
            alert('SKU "' + sku + '" já existe tanto no estoque quanto nos preços.');
            return;
          }

          Promise.all(ops).then(function(res) {
            var err = res.find(function(r) { return r.error; });
            if (err) { alert('Erro: ' + err.error.message); return; }
            var msgs = [];
            if (!estoqueExiste) msgs.push('estoque');
            if (!precosExiste) msgs.push('preços');
            alert('✓ SKU adicionado em: ' + msgs.join(' e ') + (estoqueExiste ? '\n(já existia no estoque)' : '') + (precosExiste ? '\n(já existia nos preços)' : ''));
            setNovaMarca('');
            setNovoSku('');
            setNovasUnidades(0);
            setNovoCusto('');
            carregarEstoque();
            carregarPrecos();
          });
        });
      }

        var novaQtd = tipo === 'entrada'
          ? item.unidades + quantidade

        supabase.from('estoque').update({unidades: novaQtd}).eq('id', item.id).then(function(result) {

          carregarEstoque();

      function importarSKUsExcel(file) {
        setImporting(true);
        var reader = new FileReader();
        reader.onload = function(e) {
          try {
            var data = new Uint8Array(e.target.result);
            var workbook = XLSX.read(data, {type: 'array'});
            var skusDaPlanilha = [];

            workbook.SheetNames.forEach(function(sheetName) {
              var marca = sheetName.trim().toUpperCase();
              var sheet = workbook.Sheets[sheetName];
              var rows = XLSX.utils.sheet_to_json(sheet, {header: 1});

              // Encontra a linha de cabeçalho: primeira linha onde col A é "SKU"
              var dataStart = 1; // padrão: pula só a linha 0
              for (var i = 0; i < Math.min(rows.length, 10); i++) {
                if (rows[i][0] && String(rows[i][0]).trim().toUpperCase() === 'SKU') {
                  dataStart = i + 1;
                  break;
                }
              }

              rows.slice(dataStart).forEach(function(row) {
                if (!row[0]) return;
                var sku = String(row[0]).trim().toUpperCase();
                if (!sku) return;

                var temQtd = row[1] !== null && row[1] !== undefined && row[1] !== '';
                var temCusto = row[2] !== null && row[2] !== undefined && row[2] !== '';

                skusDaPlanilha.push({
                  marca: marca, sku: sku,
                  unidades: temQtd ? (parseInt(row[1]) || 0) : null,
                  custo: temCusto ? (parseFloat(String(row[2]).replace(',', '.')) || 0) : null,
                  temQtd: temQtd, temCusto: temCusto
                });
              });
            });

            if (skusDaPlanilha.length === 0) {
              alert('Nenhum SKU encontrado no arquivo.');
              setImporting(false);
              return;
            }

            // Remove duplicatas
            var deduped = {};
            skusDaPlanilha.forEach(function(item) { deduped[item.marca + '|' + item.sku] = item; });
            var skusUnicos = Object.keys(deduped).map(function(k) { return deduped[k]; });

            var existentesEstoque = estoque.map(function(x) {
              return { id: x.id, marca: (x.marca||'').toUpperCase(), sku: (x.sku||'').toUpperCase() };
            });

            var opsEstoque = [];
            var paraUpsertPrecos = [];
            var inseridosEstoque = 0, atualizadosEstoque = 0;

            skusUnicos.forEach(function(item) {
              if (item.temQtd) {
                var found = existentesEstoque.find(function(x) { return x.marca === item.marca && x.sku === item.sku; });
                if (found) {
                  opsEstoque.push(supabase.from('estoque').update({ unidades: item.unidades }).eq('id', found.id));
                  atualizadosEstoque++;
                } else {
                  opsEstoque.push(supabase.from('estoque').insert([{ marca: item.marca, sku: item.sku, unidades: item.unidades }]));
                  inseridosEstoque++;
                }
              }
              if (item.temCusto) {
                paraUpsertPrecos.push({ marca: item.marca, sku: item.sku, custo: item.custo });
              }
            });

            // Upsert preços em lotes de 500
            var opsPrecos = [];
            var chunkSize = 500;
            for (var ci = 0; ci < paraUpsertPrecos.length; ci += chunkSize) {
              opsPrecos.push(
                supabase.from('precos').upsert(paraUpsertPrecos.slice(ci, ci + chunkSize), { onConflict: 'marca,sku', ignoreDuplicates: false })
              );
            }

            var todasOps = opsEstoque.concat(opsPrecos);
            if (todasOps.length === 0) {
              alert('Nenhuma alteração para aplicar.');
              setImporting(false);
              return;
            }

            Promise.all(todasOps).then(function(results) {
              var err = results.find(function(r) { return r && r.error; });
              if (err) {
                alert('Erro na importação: ' + err.error.message);
                setImporting(false);
                return;
              }
              var msg = '✓ Importação concluída! ' + skusUnicos.length + ' SKUs processados.\n';
              if (inseridosEstoque > 0 || atualizadosEstoque > 0)
                msg += 'Estoque: ' + inseridosEstoque + ' inseridos, ' + atualizadosEstoque + ' atualizados\n';
              if (paraUpsertPrecos.length > 0)
                msg += 'Preços: ' + paraUpsertPrecos.length + ' custos salvos';
              alert(msg);
              carregarEstoque();
              if (paraUpsertPrecos.length > 0) carregarPrecos();
              setImporting(false);
            });
          } catch (err) {
            alert('Erro ao processar arquivo: ' + err.message);
            setImporting(false);
          }
        };
        reader.readAsArrayBuffer(file);
      }

      function importarVendas(file) {
        var nomeLoja = file.name.replace(/\.[^.]+$/, '').toUpperCase();
        var reader = new FileReader();
        reader.onload = function(e) {
          try {
            var data = new Uint8Array(e.target.result);
            var wb = XLSX.read(data, {type: 'array'});
            var sheetName = wb.SheetNames.find(function(n) { return n.toLowerCase().indexOf('venda') !== -1; }) || wb.SheetNames[0];
            var rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], {header: 1, defval: ''});

            // Encontra linha de cabeçalho (tem "SKU" em alguma coluna)
            var headerIdx = -1;
            var colSku = -1, colTotal = -1, colUnidades = -1;
            for (var i = 0; i < Math.min(rows.length, 10); i++) {
              var row = rows[i];
              for (var j = 0; j < row.length; j++) {
                var val = String(row[j]).trim().toUpperCase();
                if (val === 'SKU') { colSku = j; headerIdx = i; }
                if (val === 'TOTAL (BRL)') colTotal = j;
                if (val === 'UNIDADES') colUnidades = j;
              }
              if (headerIdx !== -1) break;
            }
            if (colSku === -1) { alert('Coluna SKU não encontrada na planilha ' + nomeLoja); return; }
            if (colTotal === -1) colTotal = 17;
            if (colUnidades === -1) colUnidades = 6;

            // Agrupa por SKU
            var grupos = {};
            rows.slice(headerIdx + 1).forEach(function(row) {
              var skuRaw = String(row[colSku] || '').trim();
              if (!skuRaw) return;
              var total = parseFloat(row[colTotal]) || 0;
              if (total <= 0) return;
              var chave = nomeLoja + '||' + skuRaw;
              if (!grupos[chave]) grupos[chave] = { loja: nomeLoja, skuRaw: skuRaw, count: 0, receitaTotal: 0 };
              grupos[chave].count++;
              grupos[chave].receitaTotal += total;
            });

            var novosCards = Object.keys(grupos).map(function(k) { return grupos[k]; });

            setVendasData(function(prev) {
              // Remove registros anteriores dessa loja e adiciona novos
              var semLoja = prev.filter(function(x) { return x.loja !== nomeLoja; });
              return semLoja.concat(novosCards);
            });
          } catch(err) {
            alert('Erro ao ler planilha de vendas ' + nomeLoja + ': ' + err.message);
          }
        };
        reader.readAsArrayBuffer(file);
      }

      function normStr(s) {
        return String(s).toUpperCase().replace(/\s+/g, '').replace(/[^A-Z0-9]/g, '');
      }

      function parseSKUsML(celula) {
        var result = [];
        if (!celula) return result;
        var texto = String(celula).trim().toUpperCase();
        // Remove leading KIT: prefix
        texto = texto.replace(/^KIT:\s*/i, '');
        // Split by + (multiple items in kit)
        var partes = texto.split('+');
        var ultimaMarca = '';
        partes.forEach(function(parte) {
          parte = parte.trim();
          // Remove quantity suffix like "- 2UN", "- 3UN" etc
          parte = parte.replace(/\s*-\s*\d+\s*UN\s*$/i, '').trim();
          if (!parte) return;
          if (parte.indexOf(':') !== -1) {
            var idx = parte.indexOf(':');
            var marcaRaw = parte.substring(0, idx).trim();
            var skuRaw = parte.substring(idx + 1).trim();
            if (marcaRaw && skuRaw) {
              ultimaMarca = marcaRaw;
              result.push({ marca: normStr(marcaRaw), sku: normStr(skuRaw) });
            }
          } else if (parte && ultimaMarca) {
            // No marca prefix — use last seen marca
            result.push({ marca: normStr(ultimaMarca), sku: normStr(parte) });
          }
        });
        return result;
      }

      function lerSKUsDoArquivoML(file, idx) {
        // Nome da loja = nome do arquivo sem extensão (ex: KMP.xlsx → KMP)
        var nomeLoja = file.name.replace(/\.[^.]+$/, '').toUpperCase();
        var reader = new FileReader();
        reader.onload = function(evt) {
          try {
            var wb = XLSX.read(evt.target.result, { type: 'array' });
            var sheetName = wb.SheetNames.find(function(n) {
              return n.toLowerCase().indexOf('an') !== -1;
            }) || wb.SheetNames[0];
            var ws = wb.Sheets[sheetName];
            var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
            var headerRow = rows[0] || [];
            var skuColIdx = -1;
            for (var ci = 0; ci < headerRow.length; ci++) {
              if (String(headerRow[ci]).toUpperCase() === 'SKU') { skuColIdx = ci; break; }
            }
            if (skuColIdx === -1) skuColIdx = 4;
            var skuSet = {};
            for (var ri = 4; ri < rows.length; ri++) {
              var skuCell = rows[ri][skuColIdx];
              if (!skuCell) continue;
              var parsed = parseSKUsML(String(skuCell));
              parsed.forEach(function(p) { skuSet[p.marca + '|' + p.sku] = true; });
            }
            // Calcula nova lista fora do setState
            var novaLista = mlLojas.slice();
            var existe = novaLista.findIndex(function(l) { return l.nome === nomeLoja; });
            var actualIdx = existe !== -1 ? existe : Math.min(idx, novaLista.length);
            if (existe !== -1) {
              novaLista[existe] = { nome: nomeLoja, skuSet: skuSet, idx: actualIdx };
            } else {
              novaLista.push({ nome: nomeLoja, skuSet: skuSet, idx: actualIdx });
              novaLista = novaLista.map(function(l, i) { return { nome: l.nome, skuSet: l.skuSet, idx: i }; });
              actualIdx = novaLista.findIndex(function(l) { return l.nome === nomeLoja; });
            }
            // Salva no Supabase ANTES de atualizar estado
            supabase.from('ml_lojas').upsert(
              { nome: nomeLoja, sku_set: skuSet, idx: actualIdx, updated_at: new Date().toISOString() },
              { onConflict: 'nome' }
            ).then(function(res) {
              if (res.error) {
                alert('Erro ao salvar loja ML no Supabase: ' + res.error.message);
              }
            });
            setMlLojas(novaLista);
          } catch(err) {
            alert('Erro ao ler planilha do ML: ' + err.message);
          }
        };
        reader.readAsArrayBuffer(file);
      }

            if (result.data.length === batchSize) {

      function parseKitComponentesML(skuString) {
        var result = [];
        var texto = String(skuString).trim().toUpperCase().replace(/^KIT:\s*/i, '');
        var partes = texto.split('+');
        var ultimaMarca = '';
        partes.forEach(function(parte) {
          parte = parte.trim();
          var qtdMatch = parte.match(/\s*-\s*(\d+)\s*UN\s*$/i);
          var quantidade = qtdMatch ? parseInt(qtdMatch[1]) : 1;
          parte = parte.replace(/\s*-\s*\d+\s*UN\s*$/i, '').trim();
          if (!parte) return;
          if (parte.indexOf(':') !== -1) {
            var idx = parte.indexOf(':');
            var marcaRaw = parte.substring(0, idx).trim();
            var skuRaw  = parte.substring(idx + 1).trim();
            var skuN = normStr(skuRaw);
            if (marcaRaw && skuN && skuN.length >= 2 && skuN.length <= 25) {
              ultimaMarca = marcaRaw;
              result.push({ marca: normStr(marcaRaw), sku: skuN, skuOriginal: skuRaw.trim(), quantidade: quantidade });
            }
          } else if (parte && ultimaMarca) {
            var s = normStr(parte);
            if (s && s.length >= 2 && s.length <= 25)
              result.push({ marca: normStr(ultimaMarca), sku: s, skuOriginal: parte.trim(), quantidade: quantidade });
          }
        });
        return result;
      }

      function salvarSkuProduto(p) {

        if (!novoSku || novoSku === p.sku) { setEditandoSkuChave(null); return; }
        Promise.all([
          supabase.from('precos').update({ sku: novoSku }).eq('marca', p.marca).eq('sku', p.sku),
          supabase.from('estoque').update({ sku: novoSku }).eq('sku', p.sku)
        ]).then(function(results) {
          var err = results.find(function(r) { return r.error; });
          if (err) { alert('Erro ao salvar SKU: ' + err.error.message); return; }
          setPrecos(function(prev) { return prev.map(function(x) { return (x.marca===p.marca&&x.sku===p.sku) ? Object.assign({},x,{sku:novoSku}) : x; }); });

      function excluirSelecionados() {
        if (skusSelecionados.length === 0) return;
        if (!confirm('Excluir ' + skusSelecionados.length + ' produto(s) selecionado(s)? Esta ação não pode ser desfeita.')) return;
        var pares = skusSelecionados.map(function(chave) {
          var parts = chave.split('|');
          return { marca: parts[0], sku: parts.slice(1).join('|') };
        });
        Promise.all(pares.map(function(par) {
          return Promise.all([
            supabase.from('precos').delete().eq('marca', par.marca).eq('sku', par.sku),
            supabase.from('estoque').delete().eq('marca', par.marca).eq('sku', par.sku)
          ]);
        })).then(function(results) {
          var flat = results.reduce(function(acc, r) { return acc.concat(r); }, []);
          var err = flat.find(function(r) { return r.error; });
          if (err) { alert('Erro ao excluir: ' + err.error.message); return; }
          setPrecos(function(prev) {
            return prev.filter(function(x) {
              return !skusSelecionados.includes(x.marca + '|' + x.sku);
            });
          });
          setSkusSelecionados([]);
          setModoSelecao(false);
          carregarEstoque();

      function exportarEstoque() {
        if (!estoque || estoque.length === 0) {

          estoque.slice().sort(function(a, b) {

            return (a.sku || '').toUpperCase() < (b.sku || '').toUpperCase() ? -1 : 1;

        );

      function processarEnviosFull(file) {
        setImporting(true);
        setPendingChanges(null);

        var reader = new FileReader();
        reader.onload = function(evt) {
          try {
            var wb = XLSX.read(evt.target.result, { type: 'array' });
            var ws = wb.Sheets[wb.SheetNames[0]];
            var rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

            // Pula cabeçalho (linha 0) e lê as demais
            var entries = [];
            for (var i = 1; i < rows.length; i++) {
              var row = rows[i];
              var marca = normStr(String(row[0] || ''));
              var sku   = normStr(String(row[1] || ''));
              var qty   = parseInt(row[2]) || 0;
              if (marca && sku && qty > 0) {
                entries.push({ marca: marca, sku: sku, qty: qty });
              }
            }

            if (entries.length === 0) {
              alert('Nenhum item encontrado na planilha.');
              setImporting(false);
              return;
            }

            var dbItems = estoque.map(function(x) {
              return { id: x.id, marca: normStr(x.marca), sku: normStr(x.sku), marcaOrig: x.marca, skuOrig: x.sku, unidades: x.unidades };
            });

            var changeMap = {};
            var naoEncontrados = [];

            entries.forEach(function(entry) {
              var dbItem = dbItems.find(function(d) { return d.marca === entry.marca && d.sku === entry.sku; });
              if (!dbItem) dbItem = dbItems.find(function(d) { return d.sku === entry.sku; });

              if (dbItem) {
                if (changeMap[dbItem.id]) {
                  changeMap[dbItem.id].baixa += entry.qty;
                  changeMap[dbItem.id].novoEstoque = Math.max(0, changeMap[dbItem.id].estoqueAtual - changeMap[dbItem.id].baixa);
                } else {
                  changeMap[dbItem.id] = { id: dbItem.id, marca: dbItem.marcaOrig, sku: dbItem.skuOrig, estoqueAtual: dbItem.unidades, baixa: entry.qty, novoEstoque: Math.max(0, dbItem.unidades - entry.qty) };
                }
              } else {
                naoEncontrados.push(entry.marca + ': ' + entry.sku + ' (qty: ' + entry.qty + ')');
              }
            });

            var changes = Object.keys(changeMap).map(function(k) { return changeMap[k]; });
            setPendingChanges({ changes: changes, naoEncontrados: naoEncontrados });
            setImporting(false);
          } catch(err) {
            alert('Erro ao ler planilha: ' + err.message);
            setImporting(false);
          }
        };
        reader.readAsArrayBuffer(file);
      }

                      onChange: function(ev) { setNovaListaNome(ev.target.value); },
                      onKeyDown: function(ev) { if (ev.key === 'Enter') adicionarLista(); },
                      className: 'w-full bg-slate-700 border border-slate-500 text-white text-sm px-3 py-2 rounded-lg focus:outline-none focus:border-blue-400 mb-2'
                    }),
                    e('button', {
                      onClick: adicionarLista,
                      className: 'w-full bg-blue-600 hover:bg-blue-500 text-white text-sm py-2 rounded-lg font-bold transition-colors'
                    }, '+ Adicionar lista')
                  )
                )
              )
            );
          })()
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(e(App, null));
  </script>
</body>
</html>
